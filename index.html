 organization?","options":{"A":"Managing human resources and personnel","B":"Employee training","C":"Managing financial accounts","D":"Marketing and sales"},"correct_answer":"A. Managing human resources and personnel [15]"},{"id":"Q17","question":"Which cloud service model provides virtualized computing resources?","options":{"A":"PaaS","B":"IaaS","C":"BPaaS","D":"SaaS"},"correct_answer":"B. IaaS [16]"},{"id":"Q18","question":"In which deployment model are cloud resources dedicated to a single organization?","options":{"A":"Private Cloud","B":"Hybrid Cloud","C":"Community Cloud","D":"Public Cloud"},"correct_answer":"A. Private Cloud [16]"},{"id":"Q19","question":"What do HR specialists often spend too much time on, according to the provided text?","options":{"A":"Worldly, monotonous tasks","B":"Complex decision-making","C":"Technical training","D":"Serious issues"},"correct_answer":"A. Worldly, monotonous tasks [16]"},{"id":"Q20","question":"Which deployment model involves resources shared by several organizations with common interests?","options":{"A":"Public Cloud","B":"Hybrid Cloud","C":"Private Cloud","D":"Community Cloud"},"correct_answer":"D. Community Cloud [17]"},{"id":"Q21","question":"An organization wants to allow its approved business partners, suppliers, and a select group of customers to access a private network for sharing information without granting access to its main internal network. What type of network best describes this setup?","options":{"A":"Weblink","B":"Extranet","C":"Internet","D":"Hyperlink"},"correct_answer":"B. Extranet [17]"},{"id":"Q22","question":"A company wants to store and share files across a network and needs a reliable, low-maintenance, and easily scalable solution. What storage option is most appropriate for this scenario?","options":{"A":"Direct-Attached Storage (DAS)","B":"Network-Attached Storage (NAS)","C":"Storage Area Network (SAN)","D":"Hardware RAID"},"correct_answer":"B. Network-Attached Storage (NAS) [18]"},{"id":"Q23","question":"A company wants to set up a network within its office to allow employees to share files and communicate securely. Which type of network would be most suitable for this purpose?","options":{"A":"WAN","B":"Extranet","C":"Internet","D":"Local Area Network (LAN)"},"correct_answer":"D. Local Area Network (LAN) [18]"},{"id":"Q24","question":"You want to access a specific web page using a Uniform Resource Locator (URL). What is the term for a collection of web pages belonging to a particular URL?","options":{"A":"Internet","B":"Website","C":"Weblink","D":"Hyperlink"},"correct_answer":"B. Website [19]"},{"id":"Q25","question":"A company is looking for a cost-effective backup and archival solution with a long shelf life. What type of storage device should they consider?","options":{"A":"Tape Drive","B":"Storage Area Network (SAN)","C":"Direct-Attached Storage (DAS)","D":"Hardware RAID"},"correct_answer":"A. Tape Drive [19]"},{"id":"Q26","question":"An organization requires a high-performance storage system for mission-critical applications in a data center. Which storage solution should they consider?","options":{"A":"Direct-Attached Storage (DAS)","B":"Network-Attached Storage (NAS)","C":"Hardware RAID","D":"Storage Area Network (SAN)"},"correct_answer":"D. Storage Area Network (SAN) [20]"},{"id":"Q27","question":"A company wants to ensure the secure and efficient delivery of data packets between client applications on a network. Which layer of the TCP/IP model is responsible for providing connectivity and packet services?","options":{"A":"Data link layer","B":"Transport layer","C":"Internet layer","D":"Application layer"},"correct_answer":"B. Transport layer [20]"},{"id":"Q28","question":"A user needs a storage solution with a focus on data protection and high availability. Which RAID level should they choose?","options":{"A":"RAID Level 1","B":"RAID Level 10","C":"RAID Level 5","D":"RAID Level 3"},"correct_answer":"A. RAID Level 1 [21]"},{"id":"Q29","question":"A network topology where all the systems are connected via a central hub is known as:","options":{"A":"Ring","B":"Bus","C":"Mesh","D":"Star"},"correct_answer":"D. Star [21]"},{"id":"Q30","question":"A small business needs a storage solution for local data sharing and has limited IT support. What storage option is most suitable for their needs?","options":{"A":"Network-Attached Storage (NAS)","B":"Storage Area Network (SAN)","C":"Hardware RAID","D":"Direct-Attached Storage (DAS)"},"correct_answer":"D. Direct-Attached Storage (DAS) [21]"},{"id":"Q31","question":"What does RAID stand for in the context of data storage?","options":{"A":"Random Access In-memory Drive","B":"Read-Only And Inaccessible Data","C":"Redundant Array of Independent Disks","D":"Remote Access and Integrated Data"},"correct_answer":"C. Redundant Array of Independent Disks"},{"id":"Q32","question":"Which of the following is an example of a SCSI device?","options":{"A":"USB flash drive","B":"Hard Disk Drive (HDD)","C":"Network Attached Storage (NAS)","D":"Blu-ray disc drive"},"correct_answer":"B. Hard Disk Drive (HDD)"},{"id":"Q33","question":"What type of storage is directly attached to a single server or computer and not shared across a network?","options":{"A":"RAID (Redundant Array of Independent Disks)","B":"NAS (Network Attached Storage)","C":"DAS (Direct Attached Storage)","D":"SAN (Storage Area Network)"},"correct_answer":"C. DAS (Direct Attached Storage)"},{"id":"Q34","question":"Which of the following storage architectures is designed for high-speed data access over a local network?","options":{"A":"NAS (Network Attached Storage)","B":"SAN","C":"Tape storage","D":"DAS"},"correct_answer":"A. NAS (Network Attached Storage)"},{"id":"Q35","question":"What does LAN stand for in networking?","options":{"A":"Local Area Network","B":"Local Access Network","C":"Link Access Network","D":"Large Area Network"},"correct_answer":"A. Local Area Network"},{"id":"Q36","question":"Which network topology connects all devices in a linear chain, with each device connected to exactly two others?","options":{"A":"Star topology","B":"Bus topology","C":"Mesh topology","D":"Ring topology"},"correct_answer":"D. Ring topology"},{"id":"Q37","question":"What is the primary advantage of using a SAN (Storage Area Network) in enterprise environments?","options":{"A":"Easy scalability","B":"Low cost","C":"Centralized storage management","D":"High data transfer speed"},"correct_answer":"C. Centralized storage management"},{"id":"Q38","question":"Which TCP/IP protocol is responsible for transferring files between systems on a network?","options":{"A":"UDP (User Datagram Protocol)","B":"SMTP (Simple Mail Transfer Protocol)","C":"HTTP (Hypertext Transfer Protocol)","D":"FTP (File Transfer Protocol)"},"correct_answer":"D. FTP (File Transfer Protocol)"},{"id":"Q39","question":"In RAID 5, how many drives are required for fault tolerance while distributing parity data across all drives?","options":{"A":"5","B":"3","C":"4","D":"2"},"correct_answer":"B. 3"},{"id":"Q40","question":"Which type of storage medium is known for its long-term archival purposes, often used for backup and offline storage?","options":{"A":"SSD (Solid State Drive)","B":"Optical disc","C":"Tape","D":"HDD (Hard Disk Drive)"},"correct_answer":"C. Tape"},{"id":"Q41","question":"What role does a thin client typically play in a client-server paradigm?","options":{"A":"Active Server","B":"Passive server","C":"Active client","D":"Passive client"},"correct_answer":"C. Active client"},{"id":"Q42","question":"Which of the following is a key characteristic of server software in a client-server architecture?","options":{"A":"Waits passively for contact","B":"Implements its own features","C":"Handles many remote clients","D":"Primarily communicates with a server"},"correct_answer":"C. Handles many remote clients"},{"id":"Q43","question":"What is the primary function of a print server in a computer network?","options":{"A":"Manage prise Resource Planning","C":"Easy Resource Planning","D":"Efficient Resource Production"},"correct_answer":"B. Enterprise Resource Planning"},{"id":"Q57","question":"What is client-server architecture?","options":{"A":"Programming language","B":"An internet browser","C":"A network architecture","D":"A type of software"},"correct_answer":"C. A network architecture"},{"id":"Q58","question":"What is the purpose of an enterprise in the business world?","options":{"A":"Being a nonprofit organization","B":"Operating at a large scale","C":"Making as much profit as possible","D":"Serving the local community"},"correct_answer":"B. Operating at a large scale"},{"id":"Q59","question":"Which type of computer typically runs a server operating system?","options":{"A":"Personal computers","B":"Smartphones","C":"Mainframes","D":"Laptops"},"correct_answer":"C. Mainframes"},{"id":"Q60","question":"In a client-server network, what does the client do?","options":{"A":"Act as a firewall","B":"Request services","C":"Provide services","D":"Manage the network"},"correct_answer":"B. Request services"},{"id":"Q61","question":"Which storage type is volatile and used for actively running applications?","options":{"A":"Primary storage","B":"Secondary storage","C":"Offline storage","D":"Tertiary storage"},"correct_answer":"A. Primary storage"},{"id":"Q62","question":"What is the primary function of a CPU?","options":{"A":"Data storage","B":"Data input","C":"Data processing","D":"Data output"},"correct_answer":"C. Data processing"},{"id":"Q63","question":"Which of the following is NOT an output device?","options":{"A":"Keyboard","B":"Monitor","C":"LCD","D":"Printer"},"correct_answer":"A. Keyboard"},{"id":"Q64","question":"What is the purpose of the BIOS Setup Utility?","options":{"A":"To perform system backups","B":"To update the operating system","C":"To configure hardware settings","D":"To browse the internet"},"correct_answer":"C. To configure hardware settings"},{"id":"Q65","question":"What anization needs to establish a reliable and secure wired network connection between two offices located 1,000 kilometers apart. What type of physical medium would you choose?","options":{"A":"Coaxial cable","B":"Ethernet UTP","C":"Wi-Fi","D":"Single-mode fiber"},"correct_answer":"D. Single-mode fiber","citation":"[9]"},{"id":"Q28","question":"Your company wants to securely connect its local network to the internet. What network device is necessary to accomplish this task?","options":{"A":"Hub","B":"Cable","C":"Router","D":"Wi-Fi Extender"},"correct_answer":"C. Router","citation":"[10]"},{"id":"Q29","question":"You work for a large corporation that requires high-speed, secure data transfers between its data centers. What network device would be essential in this scenario?","options":{"A":"Switch","B":"Hub","C":"Cable","D":"Router"},"correct_answer":"A. Switch","citation":"[10]"},{"id":"Q30","question":"You need to set up a high-speed internet connection for your home. Which physical medium is a suitable choice for this scenario?","options":{"A":"Single-mode fiber","B":"Bluetooth","C":"Coaxial cable","D":"Ethernet STP"},"correct_answer":"C. Coaxial cable","citation":"[10]"},{"id":"Q31","question":"Which of the following is a wired physical medium used for network connections?","options":{"A":"Bluetooth","B":"Infrared","C":"Coaxial cable","D":"Wi-Fi"},"correct_answer":"C. Coaxial cable","citation":"[11]"},{"id":"Q32","question":"What does STP stand for in the context of Ethernet cables?","options":{"A":"Signal Transmission Protocol","B":"Single Twisted Pair","C":"Shielded Twisted Pair","D":"Secure Transmission Protocol"},"correct_answer":"C. Shielded Twisted Pair","citation":"[11]"},{"id":"Q33","question":"What is the primary advantage of fiber optic cables over copper cables for data transmission?","options":{"A":"Lower cost","B":"Easier installation","C":"Immunity to electromagnetic interference","D":"Slower data speeds"},"correct_answer":"C. Immunity to electromagne ing, and terminating connections"},"correct_answer":"D. Establishing, maintaining, and terminating connections","citation":"[4]"},{"id":"Q60","question":"At which OSI layer is data packetized and framed for transmission over the network medium?","options":{"A":"Datalink","B":"Logical","C":"Physical","D":"Network"},"correct_answer":"A. Datalink","citation":"[4]"},{"id":"Q61","question":"You live in a country with restricted internet access, and you want to access websites privately and overcome censorship. What technology can help you achieve this?","options":{"A":"MAN","B":"VPN","C":"WAN","D":"WLAN"},"correct_answer":"B. VPN","citation":"[4]"},{"id":"Q62","question":"You are traveling and want to securely access your company's network to check emails and work on documents. What technology should you use?","options":{"A":"MAN","B":"WAN","C":"WLAN","D":"VPN"},"correct_answer":"D. VPN","citation":"[5]"},{"id":"Q63","question":"You have a device that consists of a display monitor, keyboard, and mouse, and it is connected to a network where all processing is done by the server. What is this device called?","options":{"A":"Server","B":"Node","C":"Dumb terminal","D":"Workstation"},"correct_answer":"C. Dumb terminal","citation":"[5]"},{"id":"Q64","question":"You are working on a project with a team located in different countries. You need a technology that allows the transmission of messages and data between team members. What type of technology should you use?","options":{"A":"Telephone","B":"Telecommunication","C":"Dumb terminal","D":"WAN"},"correct_answer":"B. Telecommunication","citation":"[5]"},{"id":"Q65","question":"You are setting up a network for your office, and you want to ensure effective communication between devices. What do you need to establish?","options":{"A":"Client-based","B":"Protocols","C":"Decentralized","D":"Dumb terminal"},"correct_answer":"B. Protocols","citation":"[6]"},{"id":"Q66","question":"Your personal computer is connected to your office net "},"correct_answer":"B. True","citation":"[2]"},{"id":"Q9","question":"What will be the output of the given PL/SQL block? SET SERVEROUTPUT ON; DECLARE v_start NUMBER := 2; v_end NUMBER := 10; BEGIN FOR v_i IN v_start..v_end LOOP DBMS_OUTPUT.PUT_LINE(v_start); END LOOP; END;","options":{"A":"prints 2 to 10 numbers","B":"prints 2, 9 times","C":"prints 2, 10 times","D":"prints 10, 9 times"},"correct_answer":"B. prints 2, 9 times","citation":"[3]"},{"id":"Q10","question":"PL/SQL packages are schema objects that group logically related PL/SQL types, variables and subprograms.","options":{"A":"True","B":"False"},"correct_answer":"A. True","citation":"[3]"},{"id":"Q11","question":"Which attribute will return the number of rows affected by the DML statements?","options":{"A":"%FOUND","B":"%ISOPEN","C":"NOTFOUND","D":"%ROWCOUNT"},"correct_answer":"D. %ROWCOUNT","citation":"[3]"},{"id":"Q12","question":"OPEN statement will allocate memory for cursor.","options":{"A":"True","B":"False"},"correct_answer":"A. True","citation":"[4]"},{"id":"Q13","question":"Which keyword is used to declare a cursor variable?","options":{"A":"CURSOR","B":"CLOSE","C":"OPEN-FOR","D":"FETCH"},"correct_answer":"A. CURSOR","citation":"[4]"},{"id":"Q14","question":"The set of records that a cursor holds is referred as __________.","options":{"A":"Implicit cursors","B":"Context area","C":"Explicit cursors","D":"active set"},"correct_answer":"D. active set","citation":"[4]"},{"id":"Q15","question":"RAISE statement is used when a user-defined exception is defined.","options":{"A":"True","B":"False"},"correct_answer":"A. True","citation":"[4]"},{"id":"Q16","question":"Whenever an SQL statement is executed, implicit cursors are created automatically.","options":{"A":"True","B":"False"},"correct_answer":"A. True","citation":"[4]"},{"id":"Q17","question":"__________ statement completes the loop and control passes to the statement immediately after the END LOOP.","options":{"A":"CONTINUE","B":"GOTO","C":"EXIT", ocedure","D":"None of the above"},"correct_answer":"B. Function","citation":"[7]"},{"id":"Q27","question":"Which of the following is used to declare a record type?","options":{"A":"% TYPE AND %ROWTYPE","B":"%TYPE","C":"%ROWTYPE","D":"None of the given option"},"correct_answer":"C. %ROWTYPE","citation":"[7]"},{"id":"Q28","question":"__________ is the value passed when calling a subprogram.","options":{"A":"Actual Parameter","B":"None of the given option","C":"FORMAL AND ACTUAL PARAMETER","D":"Formal Parameter"},"correct_answer":"A. Actual Parameter","citation":"[8]"},{"id":"Q29","question":"Subprograms are named PL/SQL blocks, which can be called with a set of parameters.","options":{"A":"True","B":"False"},"correct_answer":"A. True","citation":"[8]"},{"id":"Q30","question":"Which option supports DML of SQL in Procedural language?","options":{"A":"PL/SQL","B":"T-SQL","C":"Standard SQL","D":"NoSQL"},"correct_answer":"A. PL/SQL","citation":"[8]"},{"id":"Q31","question":"Which keyword is used as an alternate to the assignment operator to initialize variables?","options":{"A":"NOT NULL","B":"%ROWTYPE","C":"%TYPE","D":"DEFAULT"},"correct_answer":"D. DEFAULT","citation":"[8]"},{"id":"Q32","question":"Like identifiers, the names of constants, variables, and parameters are case sensitive.","options":{"A":"True","B":"False"},"correct_answer":"B. False","citation":"[9]"},{"id":"Q33","question":"Which statements execute a sequence of statements multiple times?","options":{"A":"CASE statement","B":"LOOP statement","C":"None of the given options","D":"Loop and Case statements"},"correct_answer":"B. LOOP statement","citation":"[9]"},{"id":"Q34","question":"Find the odd one out.","options":{"A":"Triggers","B":"Packages","C":"Public Synonyms","D":"Indexes"},"correct_answer":"C. Public Synonyms","citation":"[9]"},{"id":"Q35","question":"__________ data type is a locator, which specifies the location of the large object.","options":{"A":"LOB","B":"%TYPE","C":"%ROWTYPE","D":"DATE"},"correct_answer":"A. LOB","citation":"[9]"},{"id":"Q36","question":"Which statement will make the changes permanent in a transaction made to a database?","options":{"A":"COMMIT","B":"ROLLBACK","C":"NONE","D":"SAVEPOINT"},"correct_answer":"A. COMMIT","citation":"[10]"},{"id":"Q37","question":"PL/SQL stands for __________. ","options":{"A":"Portable Language/SQL","B":"Programming Language/SQL","C":"Procedural Language/SQL","D":"None of the given options"},"correct_answer":"C. Procedural Language/SQL","citation":"[10]"},{"id":"Q38","question":"What is the maximum number of ELSE clauses that can be included in an IF clause that is not nested?","options":{"A":"0","B":"1","C":"Any number","D":"2"},"correct_answer":"B. 1","citation":"[10]"},{"id":"Q39","question":"A RECORD is a collection of heterogeneous data items that are logically related.","options":{"A":"True","B":"False"},"correct_answer":"A. True","citation":"[10]"},{"id":"Q40","question":"Assuming today is Sunday, 7 JAN 2018, predict the output of the given statement. SELECT to_char(NEXT_DAY(sysdate, 'SUNDAY'), 'DD-MON-RR') FROM dual;","options":{"A":"14-JAN-18","B":"21-JAN-18","C":"13-JAN-18","D":"15-JAN-18"},"correct_answer":"A. 14-JAN-18","citation":"[11]"}],"RDBMS using Oracle":[{"id":"Q1","question":"You need to create the patient.id_seq sequence to be used with the patient table's primary key column. The sequence should begin at 1000, have a maximum value of 999999999, never reuse any numbers, and increment by 1. Which statement would you use to complete this task?","options":{"A":"CREATE SEQUENCE patient_id_seq ON patient (patient_id) MINVALUE 1000 MAXVALUE 999999999 INCREMENT BY 1 NOCYCLE;","B":"CREATE SEQUENCE patient_id_seq START WITH 1000 MAXVALUE 999999999 STEP BY 1;","C":"This task cannot be accomplished.","D":"CREATE SEQUENCE patient_id_seq START WITH 1000 MAXVALUE 999999999 NOCYCLE;"},"correct_answer":"D. CREATE SEQUENCE patient_id_seq START WITH 1000 MAXVALUE 999999999 NOCYCLE;","citation":"[1, 2]"},{"id":"Q2","question":"A/an ___________ index is based on expressions.","options":{"A":"Function Based","B":"Unique Index","C":"Non clustered Index","D":"Clustered Index"},"correct_answer":"A. Function Based","citation":"[2]"},{"id":"Q3","question":"Which object privileges can be granted on a view?","options":{"A":"DELETE, INSERT, SELECT","B":"DELETE, INSERT, SELECT, UPDATE","C":"none","D":"ALTER, DELETE, INSERT, SELECT"},"correct_answer":"B. DELETE, INSERT, SELECT, UPDATE","citation":"[2, 3]"},{"id":"Q4","question":"Which SQL statement would you use to remove a view called EMP_DEPT_VU from your schema?","options":{"A":"DROP VIEW emp_dept_vu;","B":"DELETE VIEW emp_dept_vu;","C":"REMOVE VIEW emp_dept_vu;","D":"TRUNCATE VIEW emp_dept_vu;"},"correct_answer":"A. DROP VIEW emp_dept_vu;","citation":"[3]"},{"id":"Q5","question":"Which SQL statement grants a privilege to all the database users?","options":{"A":"grant select on department to PUBLIC;","B":"grant select on department to ALL;","C":"grant select on department to ALL USERS;"},"correct_answer":"A. grant select on department to PUBLIC;","citation":"[3]"},{"id":"Q6","question":"An owner can give specific privileges on the owner's objects to others. State True or False.","options":{"A":"True","B":"False"},"correct_answer":"A. True","citation":"[3, 4]"},{"id":"Q7","question":"Create index customer_index on customer_info(lower(city)); What will be the output of the query?","options":{"A":"The Index will be created successfully.","B":"Cannot apply a function to a column in the index."},"correct_answer":"A. The Index will be created successfully.","citation":"[4]"},{"id":"Q8","question":"Create or replace view Employees as Select emp_id, dep_name from employee_master natural join department_info; In the above complex view insert, update and delete operations are possible. State true or false.","options":{"A":"True","B":"False"},"correct_answer":"B. False","citation":"[4]"},{"id":"Q9","question":"The owner has all the privileges on the object. State true or False.","options":{"A":"True","B":"False"},"correct_answer":"A. True","citation":"[4, 5]"},{"id":"Q10","question":"CREATE INDEX emp_dept_id_idx ON employee(dept_id); Which of the following statements are true?","options":{"A":"Store an index in the EMPLOYEE table.","B":"Override the unique index created when the FK relationship was defined.","C":"May reduce the amount of disk I/O for SELECT statements."},"correct_answer":"C. May reduce the amount of disk I/O for SELECT statements.","citation":"[5]"},{"id":"Q11","question":"Equijoin is called as ___________","options":{"A":"Self join","B":"Equal Join","C":"Simple Join","D":"Outer Join"},"correct_answer":"C. Simple Join","citation":"[5]"},{"id":"Q12","question":"SELECT employee.ename FROM emp employee WHERE employee.empno NOT IN (SELECT manager.mgr FROM emp manager); The above statement returns no rows selected. Why?","options":{"A":"NOT IN operator is not allowed in subqueries.","B":"All employees have a manager.","C":"A NULL value is returned from the subquery."},"correct_answer":"C. A NULL value is returned from the subquery.","citation":"[5, 6]"},{"id":"Q13","question":"To display names and grades of customers who have the highest credit limit. Which SQL statement(s) would accomplish the task?","options":{"A":"SELECT custname, grade FROM customers, grades WHERE cust_credit_limit = (SELECT MAX(cust_credit_limit) FROM customers) AND cust_credit_limit BETWEEN startval AND endval;","B":"SELECT custname, grade FROM customers, grades WHERE cust_credit_limit IN (SELECT MAX(cust_credit_limit) FROM customers) AND cust_credit_limit BETWEEN startval AND endval;"},"correct_answer":"A and B","citation":"[6]"},{"id":"Q14","question":"The ___________ join produces the cross product of two tables.","options":{"A":"Cross","B":"Self","C":"Equi"},"correct_answer":"A. Cross","citation":"[7]"},{"id":"Q15","question":"select prod_name from products where prod_id in (select prod_id from products where prod_list_price = (select max(prod_list_price) from products where prod_list_price < (select max(prod_list_price) from products))); What is the outcome?","options":{"A":"It shows the names of all products.","B":"It shows the names of products whose list price is the second highest in the table."},"correct_answer":"B. It shows the names of products whose list price is the second highest in the table.","citation":"[7]"},{"id":"Q16","question":"To delete rows from the SALES table, where the PROMO_NAME in the PROMOTIONS table has either 'blowout sale' or 'everyday low price' as values. Which statements are valid?","options":{"A":"DELETE FROM sales WHERE promo_id IN (SELECT promo_id FROM promotions WHERE promo_name IN ('blowout sale','everyday low price'));","B":"DELETE FROM sales WHERE promo_id IN (SELECT promo_id FROM promotions WHERE promo_name = 'blowout sale' OR promo_name = 'everyday low price');"},"correct_answer":"A and B","citation":"[7, 8]"},{"id":"Q17","question":"___________ is used to retrieve records that do not meet the join condition.","options":{"A":"Outer Join","B":"Non Equi join","C":"Self join"},"correct_answer":"A. Outer Join","citation":"[8]"},{"id":"Q18","question":"Joining a table to itself is called as ___________","options":{"A":"Equi join","B":"Self join"},"correct_answer":"B. Self join","citation":"[8, 9]"},{"id":"Q19","question":"Which INSERT statement should be used to add a row into the ORDERS table for the customer whose CUST_LAST_NAME is Roberts and CREDIT_LIMIT is 600?","options":{"A":"INSERT INTO orders VALUES (1, '10-mar-2007', 'direct', (SELECT customer_id FROM customers WHERE cust_last_name='Roberts' AND credit_limit=600), 1000);","B":"INSERT INTO orders (SELECT customer_id FROM customers WHERE cust_last_name='Roberts' AND credit_limit=600);"},"correct_answer":"A","citation":"[9]"},{"id":"Q20","question":"The ___________ join is based on all columns in the two tables that have the same column name.","options":{"A":"Left Outer","B":"Cross","C":"Natural"},"correct_answer":"C. Natural","citation":"[9]"},{"id":"Q21","question":"select cust_name AS \"NAME\", cust_credit_limit/2 AS MIDPOINT, MIDPOINT + 100 AS \"MAX LOWER LIMIT\" FROM customers; Why does this produce an error?","options":{"A":"An alias cannot be used in an expression","B":"The alias MIDPOINT should be in double quotes."},"correct_answer":"A. An alias cannot be used in an expression","citation":"[10]"},{"id":"Q22","question":"The SELECT statement is used to describe the table and the table data from a database. State true or false.","options":{"A":"True","B":"False"},"correct_answer":"B. False","citation":"[10]"},{"id":"Q23","question":"Which of the following are the correct syntaxes for displaying StudentName and Department from the Student table?","options":{"A":"SELECT StudentName, Department FROM Student;","B":"select studentname, department FROM STUDENT;","C":"SELECT STUDENTNAME, DEPARTMENT FROM Student;"},"correct_answer":"A, B, and C","citation":"[10, 11]"},{"id":"Q24","question":"Which of the following command is used to select all the fields available in the table?","options":{"A":"*","B":"ALL"},"correct_answer":"A. *","citation":"[11]"},{"id":"Q25","question":"___________ clause is used to retrieve data from one or more tables?","options":{"A":"Where","B":"Select","C":"Order by"},"correct_answer":"B. Select","citation":"[11]"},{"id":"Q26","question":"Complete the query: select the student details whose firstname starts with 'A' or whose city is 'Chennai' and firstname ends with 'n'. select * from CSR_STUDENT where firstname like 'A%' _____ city ='Chennai' _____ firstname like '%n';","options":{"A":"OR, AND","B":"AND, OR"},"correct_answer":"A. OR, AND","citation":"[11, 12]"},{"id":"Q27","question":"Which statement is used to manipulate data without affecting the data in the table?","options":{"A":"Delete","B":"Insert","C":"Select"},"correct_answer":"C. Select","citation":"[12]"},{"id":"Q28","question":"Select the suitable option for retrieving all the employees whose name ends with \"kumar\"?","options":{"A":"select * from employee where empname like '%kumar';","B":"select * from employee where empname like 'kumar%';"},"correct_answer":"A. select * from employee where empname like '%kumar';","citation":"[12]"},{"id":"Q29","question":"Which statement about SQL is true?","options":{"A":"Date values are displayed in descending order by default.","B":"Null values are displayed last in ascending sequences."},"correct_answer":"B. Null values are displayed last in ascending sequences.","citation":"[12, 13]"},{"id":"Q30","question":"Select the suitable option for retrieving all the employees who have a manager?","options":{"A":"select empname, manager_id from employee where manager_id is NULL;","B":"select empname, manager_id from employee where manager_id IS NOT NULL;"},"correct_answer":"B. select empname, manager_id from employee where manager_id IS NOT NULL;","citation":"[13]"},{"id":"Q31","question":"DML is used to ___________","options":{"A":"Control access to data.","B":"Manipulate the data stored in a database."},"correct_answer":"B. Manipulate the data stored in a database.","citation":"[13]"},{"id":"Q32","question":"Select the suitable option(s) for retrieving all the employees whose salary range is between 40000 and 100000?","options":{"A":"select name, salary from employee where salary between 40000 and 100000;","B":"select name, salary from employee where salary >= 40000 and salary <= 100000;"},"correct_answer":"A and B","citation":"[13, 14]"},{"id":"Q33","question":"Which operator is equivalent to the 'or' operator?","options":{"A":"In","B":"&&"},"correct_answer":"A. In","citation":"[14]"},{"id":"Q34","question":"How to retrieve department_id column without any duplication from employee relation?","options":{"A":"select distinct department_id from employee;","B":"select department_id from employee;"},"correct_answer":"A. select distinct department_id from employee;","citation":"[14]"},{"id":"Q35","question":"Which statement is true regarding distinct keywords?","options":{"A":"Distinct remove duplicate values in the Select clause.","B":"Distinct reduces execution time."},"correct_answer":"A. Distinct remove duplicate values in the Select clause.","citation":"[14, 15]"},{"id":"Q36","question":"Create table subjects(Sub_id number(2) primary key, Subj_name varchar(50)); Insert into subjects values (null,'Oracle'); What is the output?","options":{"A":"The query will generate an ORA-01400: cannot insert NULL value into primary key","B":"The query will be executed successfully."},"correct_answer":"A. The query will generate an ORA-01400: cannot insert NULL value into primary key","citation":"[15]"},{"id":"Q37","question":"Which option is used to delete data from both parent and child tables?","options":{"A":"Restrict","B":"Cascade"},"correct_answer":"B. Cascade","citation":"[15]"},{"id":"Q38","question":"Which query will change the cust_address to 'Panama' for those who are from 'Los Angeles'?","options":{"A":"Update customer set cust_address='Panama' where cust_address='Los Angeles';","B":"Update table customer set cust_address='Panama' where cust_address='Los Angeles';"},"correct_answer":"A. Update customer set cust_address='Panama' where cust_address='Los Angeles';","citation":"[16]"},{"id":"Q39","question":"How do we represent comments in oracle?","options":{"A":"--","B":"/* ... */"},"correct_answer":"A and B","citation":"[16]"},{"id":"Q40","question":"You need to remove all the data from the employee table while leaving the definition intact. You want to be able to undo this operation. How?","options":{"A":"TRUNCATE TABLE employee;","B":"DELETE FROM employee;"},"correct_answer":"B. DELETE FROM employee;","citation":"[16, 17]"},{"id":"Q41","question":"Which statements are true regarding constraints?","options":{"A":"A column with the UNIQUE constraint can contain NULL values.","B":"A constraint can be disabled even if the constraint column contains data."},"correct_answer":"A and B","citation":"[17]"},{"id":"Q42","question":"Which query will delete all the data in the Employee table that belongs to employee id 1207?","options":{"A":"Delete all from Employee where emp_id=1207;","B":"Delete from Employee where emp_id=1207;"},"correct_answer":"B. Delete from Employee where emp_id=1207;","citation":"[17]"},{"id":"Q43","question":"Which statement is true when a DROP TABLE command is executed?","options":{"A":"The table structure and its deleted data cannot be rolled back and restored once the DROP TABLE command is executed.","B":"All pending transactions are rolled back."},"correct_answer":"A. The table structure and its deleted data cannot be rolled back and restored once the DROP TABLE command is executed.","citation":"[17, 18]"},{"id":"Q44","question":"Which statement is used to update multiple rows in a single query?","options":{"A":"When","B":"None of the given options"},"correct_answer":"B. None of the given options","citation":"[18]"},{"id":"Q45","question":"A DML statement is used to modify the structure of the database. State True or false.","options":{"A":"True","B":"False"},"correct_answer":"B. False","citation":"[18]"},{"id":"Q46","question":"Which command removes the table itself from the database?","options":{"A":"Drop","B":"Truncate","C":"Delete"},"correct_answer":"A. Drop","citation":"[18]"},{"id":"Q47","question":"It is possible to update more than one column with a single UPDATE statement. State true or false.","options":{"A":"True","B":"False"},"correct_answer":"A. True","citation":"[19]"},{"id":"Q48","question":"To have all the rows deleted using a delete statement, you must specify a WHERE clause that specifies all the rows. State true or false.","options":{"A":"True","B":"False"},"correct_answer":"B. False","citation":"[19]"},{"id":"Q49","question":"To change the structure of the table we use ___________ Syntax.","options":{"A":"ALTER TABLE","B":"CHANGE TABLE"},"correct_answer":"A. ALTER TABLE","citation":"[19, 20]"},{"id":"Q50","question":"Which statement/command would not cause a transaction to end?","options":{"A":"SELECT","B":"COMMIT","C":"CREATE"},"correct_answer":"A. SELECT","citation":"[20]"},{"id":"Q51","question":"Which of the update statement produces the following error in the employee table? ORA-02291: integrity constraint (SYS_C23) violated - parent key not found","options":{"A":"UPDATE Employee SET Deptid=3 WHERE Empid = 101;","B":"UPDATE Employee SET empid = NULL WHERE phoneno=9876543210;","C":"UPDATE Employee SET empid = NULL WHERE deptid=5;","D":"UPDATE Employee SET Empid = 101 WHERE Deptid=3;"},"correct_answer":"A. UPDATE Employee SET Deptid=3 WHERE Empid = 101;","citation":"[1]"},{"id":"Q52","question":"Which SQL statement needs both insert and update privilege on the target table and select privilege on the source table?","options":{"A":"alter","B":"delete","C":"merge","D":"update"},"correct_answer":"C. merge","citation":"[2]"},{"id":"Q53","question":"Which of the following is not a DML statement?","options":{"A":"SELECT","B":"DROP","C":"UPDATE","D":"ALTER"},"correct_answer":"B and D (DROP, ALTER)","citation":"[2]"},{"id":"Q54","question":"Which are auto-commit statements?","options":{"A":"Insert","B":"Drop","C":"Truncate","D":"Delete"},"correct_answer":"B and C (Drop, Truncate)","citation":"[2]"},{"id":"Q55","question":"On delete restrict is used to restrict the deletion of child records. State True or False.","options":{"A":"True","B":"False"},"correct_answer":"A. True","citation":"[2]"},{"id":"Q56","question":"Consider the below table structure [where phoneno is Not Null]: insert into employee(empid,empname) values(123,'John'); When we issue the above insert command and if the statement fails, what would be the reason?","options":{"A":"The statement will get executed successfully","B":"empid value should be given with double quotes.","C":"Value for phoneno is missing.","D":"The column order should not be changed."},"correct_answer":"C. Value for phoneno is missing.","citation":"[3]"},{"id":"Q57","question":"Delete statement supports up to two conditions only. State True or False.","options":{"A":"True","B":"False"},"correct_answer":"B. False","citation":"[3]"},{"id":"Q58","question":"Which statement inserts a new row into the STUDENT table?","options":{"A":"INSERT INTO student (stud_id, address, name, dob) VALUES (101, '100 Main Street', 'Smith', '17-JUN-99');","B":"INSERT INTO student (stud_id, address, dob) VALUES (101, '100 Main Street', '17-JUN-99');","C":"INSERT INTO student VALUES (101, '100 Main Street', '17-JUN-99', 'Smith');","D":"INSERT INTO student VALUES (101, 'Smith');"},"correct_answer":"A. INSERT INTO student (stud_id, address, name, dob) VALUES (101, '100 Main Street', 'Smith', '17-JUN-99');","citation":"[4]"},{"id":"Q59","question":"Which query is used to delete employee records whose age is greater than 55?","options":{"A":"Delete * from employee where age=55;","B":"Delete from employee where age >=55;","C":"Delete * from employee where age <55;","D":"Delete from employee where age >55;"},"correct_answer":"D. Delete from employee where age >55;","citation":"[4]"},{"id":"Q60","question":"DELETE FROM dept WHERE dept_id = 901; The above delete statement throws an integrity constraint error because a child record was found. What could we do to make the statement execute?","options":{"A":"You cannot make the command execute.","B":"Add the \"CONSTRAINTS CASCADE\" option to the command.","C":"Delete the child records first.","D":"Add the FORCE keyword to the command."},"correct_answer":"C. Delete the child records first.","citation":"[5]"},{"id":"Q61","question":"__________ key has a unique and holds the value to identify the record and duplicate null values are not allowed.","options":{"A":"Foreign Key","B":"All of the given options","C":"Primary key","D":"Not Null"},"correct_answer":"C. Primary key","citation":"[5]"},{"id":"Q62","question":"Cascade constraints are used only in drop statements. State True or False.","options":{"A":"True","B":"False"},"correct_answer":"B. False","citation":"[6]"},{"id":"Q63","question":"To permanently remove all the data from the STUDENT table, and you need the table structure in the future. Which single command performs this?","options":{"A":"DELETE * FROM student KEEP STRUCTURE;","B":"TRUNCATE TABLE student;","C":"DROP TABLE student;","D":"TRUNCATE TABLE student KEEP STRUCTURE;"},"correct_answer":"B. TRUNCATE TABLE student;","citation":"[6]"},{"id":"Q64","question":"Which of the following are true about check constraints?","options":{"A":"Check constraint can be applied only for one column in a table","B":"Check constraint can be used for both column level and table level","C":"Check constraint can be applied on characters without the use of scalar functions","D":"Check constraint can be used only for column level"},"correct_answer":"B. Check constraint can be used for both column level and table level","citation":"[6]"},{"id":"Q65","question":"Which CREATE TABLE statement is valid?","options":{"A":"CREATE TABLE ord_details (ord_no NUMBER(2) UNIQUE, NOT NULL, item_no NUMBER(3), ord_date DATE DEFAULT SYSDATE NOT NULL);","B":"CREATE TABLE ord_details (ord_no NUMBER(2), item_no NUMBER(3), ord_date DATE DEFAULT SYSDATE NOT NULL, CONSTRAINT ord_pk PRIMARY KEY (ord_no, item_no));","C":"CREATE TABLE ord_details (ord_no NUMBER(2), item_no NUMBER(3), ord_date DATE DEFAULT SYSDATE NOT NULL, CONSTRAINT ord_uq UNIQUE (ord_no), CONSTRAINT ord_pk PRIMARY KEY (ord_no));","D":"CREATE TABLE ord_details (ord_no NUMBER(2) PRIMARY KEY, item_no NUMBER(3) PRIMARY KEY, ord_date DATE NOT NULL);"},"correct_answer":"B. CREATE TABLE ord_details (ord_no NUMBER(2), item_no NUMBER(3), ord_date DATE DEFAULT SYSDATE NOT NULL, CONSTRAINT ord_pk PRIMARY KEY (ord_no, item_no));","citation":"[7]"},{"id":"Q66","question":"Composite key is used in one to one relationship. State true or false.","options":{"A":"True","B":"False"},"correct_answer":"B. False","citation":"[8]"},{"id":"Q67","question":"When we attempt to create the salary table with the command including lines \"4.1995_salary NUMBER(8,2),\" and \"7.$salary_96 NUMBER(8,2);\", which lines will return errors?","options":{"A":"1 and 5","B":"2 and 3","C":"4 and 7"},"correct_answer":"C. 4 and 7","citation":"[8]"},{"id":"Q68","question":"Which statement would you use to add a primary key constraint to the patient table using the id_number column, immediately enabling the constraint?","options":{"A":"ALTER TABLE patient MODIFY (id_number CONSTRAINT pat_id_pk PRIMARY KEY);","B":"ALTER TABLE patient ADD (id_number CONSTRAINT pat_id_pk PRIMARY KEY);","C":"This task cannot be accomplished.","D":"ALTER TABLE patient ADD CONSTRAINT pat_id_pk PRIMARY KEY(id_number);"},"correct_answer":"D. ALTER TABLE patient ADD CONSTRAINT pat_id_pk PRIMARY KEY(id_number);","citation":"[8]"},{"id":"Q69","question":"Management wants to add a default value to the SALARY column. What is true about your ALTER statement?","options":{"A":"Column definitions cannot be altered to add DEFAULT values.","B":"A change to the DEFAULT value affects only subsequent insertions to the table.","C":"Column definitions cannot be altered at add DEFAULT values for columns with a NUMBER data type.","D":"All the rows that have a NULL value for the SALARY column will be updated with the value 5000."},"correct_answer":"B. A change to the DEFAULT value affects only subsequent insertions to the table.","citation":"[9]"},{"id":"Q70","question":"By using __________ datatype we can store numeric and character values as an input.","options":{"A":"varchar","B":"Char","C":"varchar2","D":"All of the given options"},"correct_answer":"D. All of the given options","citation":"[9]"},{"id":"Q71","question":"An emp table contains fields employ name, desig and salary. How do you drop column salary?","options":{"A":"alter table emp delete column salary;","B":"alter table emp delete salary;","C":"alter table emp drop column salary;","D":"delete from emp where column = salary;"},"correct_answer":"C. alter table emp drop column salary;","citation":"[10]"},{"id":"Q72","question":"How would you add a foreign key constraint on the dept_no column in the EMP table, referring to the id column in the DEPT table?","options":{"A":"Use the ALTER TABLE command with the MODIFY clause on the EMP table.","B":"Use the ALTER TABLE command with the ADD clause on the EMP table.","C":"Use the ALTER TABLE command with the MODIFY clause on the DEPT table.","D":"This task cannot be accomplished."},"correct_answer":"B. Use the ALTER TABLE command with the ADD clause on the EMP table.","citation":"[10]"},{"id":"Q73","question":"Which command is used to change a table's behavior?","options":{"A":"CREATE","B":"ALTER","C":"DROP","D":"RENAME"},"correct_answer":"B. ALTER","citation":"[11]"},{"id":"Q74","question":"Match the column to the appropriate constraint based on standard practices.","options":{"A":"creditcardno -> primary key","B":"validitydate -> not null","C":"creditcardtype (silver/platinum) -> check","D":"cardholderphoneno -> unique","E":"cardholdername -> not null"},"correct_answer":"All listed matches are correct.","citation":"[11]"},{"id":"Q75","question":"A table consists of _____ primary keys.","options":{"A":"4","B":"1","C":"2","D":"Any number"},"correct_answer":"B. 1","citation":"[11]"},{"id":"Q76","question":"Choose the correct options. __________ command is used to delete the records and __________ command is used to delete the db objects?","options":{"A":"Truncate, Drop","B":"Drop, Truncate","C":"Delete, Truncate","D":"Truncate, Delete"},"correct_answer":"A. Truncate, Drop","citation":"[11]"},{"id":"Q77","question":"We need to ensure that the amount withdrawn should be less then the credit card limit amount, to ensure this integrity what type constraint will be used?","options":{"A":"column level foreign key constraint","B":"table level check constraint","C":"table level foreign key constraint","D":"column level check constraint"},"correct_answer":"B. table level check constraint","citation":"[12]"},{"id":"Q78","question":"Which of the following options is not correct for altering a table?","options":{"A":"alter table emp modify name varchar(30);","B":"alter table emp drop column_name;","C":"alter table emp add column_name varchar(25);","D":"alter table emp drop column column_name;"},"correct_answer":"B. alter table emp drop column_name;","citation":"[12]"},{"id":"Q79","question":"Which of the following is not modification of the database?","options":{"A":"Sorting","B":"Deletion","C":"Insertion","D":"Updating"},"correct_answer":"A. Sorting","citation":"[13]"},{"id":"Q80","question":"Column header is referred as:","options":{"A":"Domain","B":"Attributes","C":"Relation","D":"Table"},"correct_answer":"B. Attributes","citation":"[13]"},{"id":"Q81","question":"__________ is called as meta data.","options":{"A":"Meta Dictionary","B":"Meta Information","C":"Data Information","D":"Data Dictionary"},"correct_answer":"D. Data Dictionary","citation":"[13]"},{"id":"Q82","question":"Which of the following is not a part of RDBMS?","options":{"A":"Objects","B":"Views","C":"DDL","D":"Polymorphism"},"correct_answer":"D. Polymorphism","citation":"[13]"},{"id":"Q83","question":"SQL was developed in the 1970s. State true or false.","options":{"A":"True","B":"False"},"correct_answer":"A. True","citation":"[13]"},{"id":"Q84","question":"Which of these are standard and best practises for SQL?","options":{"A":"All of the given options","B":"Don't use space in identifiers.","C":"Use upper case for all SQL keywords.","D":"Each table must have a primary key."},"correct_answer":"A. All of the given options","citation":"[14]"},{"id":"Q85","question":"The constraint name will be the default name if the constraint name is not mentioned for an attribute. State true or false.","options":{"A":"True","B":"False"},"correct_answer":"A. True","citation":"[14]"},{"id":"Q86","question":"In a relational database a referential integrity constraint can be done using","options":{"A":"foreign key","B":"composite key","C":"secondary key","D":"primary key"},"correct_answer":"A. foreign key","citation":"[14]"},{"id":"Q87","question":"Which of the following data models supports many-to-many relationships?","options":{"A":"Network model","B":"Hierarchical model","C":"Relational model","D":"Waterfall model"},"correct_answer":"A and C (Network model, Relational model)","citation":"[15]"},{"id":"Q88","question":"A relational database consists of a collection of","options":{"A":"Keys","B":"Fields","C":"Tables","D":"Records"},"correct_answer":"C. Tables","citation":"[15]"},{"id":"Q89","question":"Tom has designed a payroll software for XYZ technology. The software will store the salary details into the database and later he can retrieve the same for future references. Tom falls under which category of user?","options":{"A":"DBA","B":"Network Administrator","C":"Application Programmer","D":"End User"},"correct_answer":"C. Application Programmer","citation":"[15]"},{"id":"Q90","question":"Match the data models to their representation styles.","options":{"A":"Tree -> hierarchical","B":"Graph -> network","C":"Table -> relational"},"correct_answer":"All listed matches are correct.","citation":"[16]"},{"id":"Q91","question":"SQL is a case sensitive language and the data stored inside the table are case in-sensitive. Say true or false?","options":{"A":"True","B":"False"},"correct_answer":"B. False","citation":"[16]"},{"id":"Q92","question":"Which of the following is not a valid relational database?","options":{"A":"MySQL","B":"Sybase","C":"Oracle","D":"Unify"},"correct_answer":"D. Unify","citation":"[16]"},{"id":"Q93","question":"Match the relational terms to their definitions.","options":{"A":"Number of rows -> cardinality","B":"Rows of the table -> Tuples","C":"Number of columns -> Degree","D":"Range of values for attribute -> Domain","E":"Columns of the table -> Attribute"},"correct_answer":"All listed matches are correct.","citation":"[17]"},{"id":"Q94","question":"Database is a shared collection of logically unrelated data, designed to meet the needs of an organization. State True or False.","options":{"A":"TRUE","B":"FALSE"},"correct_answer":"B. FALSE","citation":"[17]"},{"id":"Q95","question":"Which of the following are data models?","options":{"A":"Relational","B":"Hierarchical","C":"Network","D":"Conceptual"},"correct_answer":"A, B, and C (Relational, Hierarchical, Network)","citation":"[18]"},{"id":"Q96","question":"Which of the following are DML statements?","options":{"A":"SELECT","B":"INSERT","C":"CREATE","D":"TRUNCATE"},"correct_answer":"A and B (SELECT, INSERT)","citation":"[18]"},{"id":"Q97","question":"Which of the following represents the degree of the relation?","options":{"A":"No of Attributes","B":"Cardinality","C":"No of rows","D":"Domain"},"correct_answer":"A. No of Attributes","citation":"[18]"},{"id":"Q98","question":"Which of the following are considered as constraints?","options":{"A":"NULL","B":"NOT NULL","C":"Unique","D":"Check"},"correct_answer":"B, C, and D (NOT NULL, Unique, Check)","citation":"[18]"}]}
;

// State
let selectedTopic = null;
let questions = [];
let current = 0;
let score = 0;
let answered = false;
let qCount = 10;

// Build topic grid
const topicGrid = document.getElementById('topic-grid');
Object.entries(QUIZ_DATA).forEach(([topic, qs]) => {
  const card = document.createElement('div');
  card.className = 'topic-card';
  card.innerHTML = `<div class="tc-name">${topic}</div><div class="tc-count">${qs.length} questions</div>`;
  card.addEventListener('click', () => {
    document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedTopic = topic;
    const max = QUIZ_DATA[topic].length;
    document.getElementById('q-count').max = max;
    document.getElementById('max-label').textContent = `max ${max}`;
    document.getElementById('q-count').value = Math.min(10, max);
    document.getElementById('btn-start').disabled = false;
  });
  topicGrid.appendChild(card);
});

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  if (!selectedTopic) return;
  qCount = Math.min(parseInt(document.getElementById('q-count').value) || 10, QUIZ_DATA[selectedTopic].length);
  questions = shuffle([...QUIZ_DATA[selectedTopic]]).slice(0, qCount);
  current = 0; score = 0;
  showScreen('quiz-screen');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('quiz-topic-label').textContent = selectedTopic;
  document.getElementById('quiz-progress-text').textContent = `${current + 1} / ${qCount}`;
  document.getElementById('progress-bar').style.width = `${((current) / qCount) * 100}%`;
  document.getElementById('question-num').textContent = `Question ${current + 1}`;
  document.getElementById('question-text').textContent = q.question;

  const optList = document.getElementById('options-list');
  optList.innerHTML = '';
  Object.entries(q.options).forEach(([key, val]) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-key">${key}</span><span>${val}</span>`;
    btn.addEventListener('click', () => selectAnswer(key, btn, q));
    optList.appendChild(btn);
  });

  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  fb.textContent = '';
  document.getElementById('btn-next').className = 'btn-next';
}

function selectAnswer(key, btn, q) {
  if (answered) return;
  answered = true;

  // Determine correct key
  const correctKey = q.correct_answer.charAt(0);
  const isCorrect = key === correctKey;
  if (isCorrect) score++;

  // Style all options
  document.querySelectorAll('.option-btn').forEach(b => {
    b.classList.add('disabled');
    const bKey = b.querySelector('.option-key').textContent;
    if (bKey === correctKey) b.classList.add('correct');
    else if (bKey === key && !isCorrect) b.classList.add('wrong');
  });

  // Feedback
  const fb = document.getElementById('feedback-box');
  if (isCorrect) {
    fb.className = 'feedback-box correct-fb show';
    fb.innerHTML = '✓ Correct!';
  } else {
    fb.className = 'feedback-box wrong-fb show';
    const correctVal = q.options[correctKey] || '';
    fb.innerHTML = `✗ Incorrect. <span class="correct-ans">Correct answer: ${correctKey}. ${correctVal}</span>`;
  }

  document.getElementById('btn-next').className = 'btn-next show';
}

function nextQuestion() {
  current++;
  if (current >= qCount) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  const pct = Math.round((score / qCount) * 100);
  document.getElementById('result-pct').textContent = `${pct}%`;

  let title = pct === 100 ? 'Perfect Score!' : pct >= 80 ? 'Excellent Work!' : pct >= 60 ? 'Good Effort!' : pct >= 40 ? 'Keep Practicing!' : 'Keep Studying!';
  document.getElementById('result-title').textContent = title;

  document.getElementById('result-stats').innerHTML = `
    <div class="stat-pill">Score <span class="val">${score}/${qCount}</span></div>
    <div class="stat-pill">Correct <span class="val">${score}</span></div>
    <div class="stat-pill">Incorrect <span class="val">${qCount - score}</span></div>
    <div class="stat-pill">Topic <span class="val">${selectedTopic}</span></div>
  `;
  document.getElementById('progress-bar').style.width = '100%';
  showScreen('result-screen');
}

function retryQuiz() {
  questions = shuffle([...QUIZ_DATA[selectedTopic]]).slice(0, qCount);
  current = 0; score = 0;
  showScreen('quiz-screen');
  renderQuestion();
}

function quitQuiz() {
  goHome();
}

function goHome() {
  showScreen('home-screen');
}
</script>

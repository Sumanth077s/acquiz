<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accenture Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --card: #16161f;
  --border: #2a2a3a;
  --accent: #a78bfa;
  --accent2: #38bdf8;
  --accent3: #34d399;
  --danger: #f87171;
  --text: #e2e8f0;
  --muted: #64748b;
  --correct: #34d399;
  --wrong: #f87171;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(167,139,250,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(167,139,250,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.glow-orb {
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}
.orb1 { background: rgba(167,139,250,0.08); top: -200px; left: -200px; }
.orb2 { background: rgba(56,189,248,0.06); bottom: -200px; right: -200px; }

.container {
  position: relative;
  z-index: 1;
  max-width: 860px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* SCREENS */
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }

/* HOME SCREEN */
#home-screen {
  justify-content: center;
  align-items: center;
  text-align: center;
  gap: 40px;
  padding: 40px 20px;
}

.logo-tag {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--accent);
  text-transform: uppercase;
  opacity: 0.8;
}

.home-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(48px, 8vw, 80px);
  font-weight: 800;
  line-height: 0.95;
  letter-spacing: -2px;
}

.home-title span {
  display: block;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.home-sub {
  color: var(--muted);
  font-size: 16px;
  font-weight: 300;
  max-width: 400px;
  line-height: 1.7;
}

/* Topic grid */
.topic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  width: 100%;
  max-width: 700px;
}

.topic-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: left;
  position: relative;
  overflow: hidden;
}

.topic-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  opacity: 0;
  transition: opacity 0.2s;
}

.topic-card:hover::before { opacity: 0.07; }
.topic-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.topic-card.selected { border-color: var(--accent); background: rgba(167,139,250,0.1); }
.topic-card.selected::before { opacity: 0.1; }

.topic-card .tc-name {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  position: relative;
  line-height: 1.3;
}

.topic-card .tc-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
  position: relative;
}

.topic-card.selected .tc-name { color: var(--accent); }

/* Config section */
.config-section {
  width: 100%;
  max-width: 700px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.config-row {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.config-label {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  min-width: 120px;
}

.num-input {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  font-weight: 500;
  padding: 10px 16px;
  border-radius: 8px;
  width: 100px;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}
.num-input:focus { border-color: var(--accent); }

.btn-start {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 16px 40px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  color: #fff;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  width: 100%;
  max-width: 700px;
}
.btn-start:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 30px rgba(167,139,250,0.3); }
.btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* QUIZ SCREEN */
#quiz-screen { gap: 0; padding-top: 20px; }

.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 12px;
  flex-wrap: wrap;
}

.quiz-topic-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
}

.quiz-progress-text {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--muted);
}

.progress-bar-wrap {
  height: 3px;
  background: var(--border);
  border-radius: 99px;
  margin-bottom: 32px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 99px;
  transition: width 0.4s ease;
}

.question-num {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-bottom: 12px;
}

.question-text {
  font-family: 'Syne', sans-serif;
  font-size: clamp(18px, 3vw, 24px);
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 32px;
  color: var(--text);
}

.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 32px;
}

.option-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  text-align: left;
  cursor: pointer;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 400;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: all 0.18s ease;
  position: relative;
  overflow: hidden;
}

.option-btn:hover:not(.disabled) {
  border-color: var(--accent);
  background: rgba(167,139,250,0.07);
  transform: translateX(4px);
}

.option-btn.disabled { cursor: default; }

.option-btn.correct {
  border-color: var(--correct);
  background: rgba(52,211,153,0.1);
  color: var(--correct);
}

.option-btn.wrong {
  border-color: var(--wrong);
  background: rgba(248,113,113,0.1);
  color: var(--wrong);
}

.option-key {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.18s, color 0.18s;
}

.option-btn.correct .option-key { background: var(--correct); color: #000; }
.option-btn.wrong .option-key { background: var(--wrong); color: #000; }

.feedback-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 24px;
  font-size: 14px;
  line-height: 1.6;
  display: none;
}
.feedback-box.show { display: block; }
.feedback-box.correct-fb { border-color: var(--correct); color: var(--correct); }
.feedback-box.wrong-fb { border-color: var(--wrong); }
.feedback-box .correct-ans { color: var(--correct); font-weight: 500; }

.quiz-footer {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  margin-top: auto;
  padding-top: 16px;
}

.btn-next {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 14px 32px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  color: #fff;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  display: none;
}
.btn-next.show { display: block; }
.btn-next:hover { opacity: 0.9; transform: translateY(-1px); }

.btn-quit {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 14px 20px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.btn-quit:hover { border-color: var(--danger); color: var(--danger); }

/* RESULTS SCREEN */
#result-screen {
  justify-content: center;
  align-items: center;
  text-align: center;
  gap: 32px;
  padding: 40px 20px;
}

.result-badge {
  font-family: 'Syne', sans-serif;
  font-size: clamp(80px, 15vw, 130px);
  font-weight: 800;
  line-height: 1;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.result-label {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 4px;
  color: var(--muted);
  text-transform: uppercase;
}

.result-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(24px, 5vw, 40px);
  font-weight: 800;
}

.result-stats {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
}

.stat-pill {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 10px 24px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
}

.stat-pill .val { color: var(--accent2); font-weight: 500; }

.result-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn-retry {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 14px 32px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  color: #fff;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.btn-retry:hover { opacity: 0.9; }

.btn-home {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 14px 24px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.btn-home:hover { border-color: var(--accent); color: var(--accent); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.screen.active > * {
  animation: fadeUp 0.4s ease forwards;
}

</style>
</head>
<body>
<div class="glow-orb orb1"></div>
<div class="glow-orb orb2"></div>

<div class="container">

  <!-- HOME SCREEN -->
  <div id="home-screen" class="screen active">
    <p class="logo-tag">Accenture Training</p>
    <div>
      <h1 class="home-title">Knowledge<span>Quiz</span></h1>
    </div>
    <p class="home-sub">Select a topic, set the number of questions, and test your knowledge.</p>

    <div class="topic-grid" id="topic-grid"></div>

    <div class="config-section">
      <div class="config-row">
        <span class="config-label">Questions</span>
        <input type="number" class="num-input" id="q-count" value="10" min="1" max="50">
        <span style="color:var(--muted);font-size:13px;" id="max-label"></span>
      </div>
    </div>

    <button class="btn-start" id="btn-start" disabled onclick="startQuiz()">Start Quiz</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen" class="screen">
    <div class="quiz-header">
      <span class="quiz-topic-label" id="quiz-topic-label"></span>
      <span class="quiz-progress-text" id="quiz-progress-text"></span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar"></div></div>

    <p class="question-num" id="question-num"></p>
    <p class="question-text" id="question-text"></p>

    <div class="options-list" id="options-list"></div>

    <div class="feedback-box" id="feedback-box"></div>

    <div class="quiz-footer">
      <button class="btn-quit" onclick="quitQuiz()">Quit</button>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next →</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen" class="screen">
    <p class="result-label">Quiz Complete</p>
    <div class="result-badge" id="result-pct"></div>
    <h2 class="result-title" id="result-title"></h2>
    <div class="result-stats" id="result-stats"></div>
    <div class="result-actions">
      <button class="btn-retry" onclick="retryQuiz()">Try Again</button>
      <button class="btn-home" onclick="goHome()">← Back to Topics</button>
    </div>
  </div>

</div>

<script>
const QUIZ_DATA = {"AWS Practitioner":[{"id":"Q1","question":"Which tool is used for getting the estimated monthly cost for your setup?","options":{"A":"TCO Calculator","B":"Cost explorer","C":"Consolidated Billings","D":"Simple Monthly Calculator"},"correct_answer":"D. Simple Monthly Calculator"},{"id":"Q2","question":"Which of the following pricing model used for application with consistent load?","options":{"A":"All the options","B":"Spot pricing","C":"On-demand pricing","D":"Reserved instance pricing"},"correct_answer":"D. Reserved instance pricing"},{"id":"Q3","question":"Amazon S3 pricing is based on factors namely ___________","options":{"A":"Storage","B":"Requests and data retrievals","C":"Data transfer","D":"All of the above"},"correct_answer":"D. All of the above (Storage, Requests and data retrievals, Data transfer)"},{"id":"Q4","question":"Which AWS service allows you to centrally manage multiple AWS accounts?","options":{"A":"Resource Groups","B":"Systems Manager","C":"Organizations","D":"Billing and Cost Management"},"correct_answer":"C. Organizations"},{"id":"Q5","question":"The auction based pricing system is called _______","options":{"A":"Volume discounts or tier based pricing","B":"Spot pricing","C":"Reserved instance pricing","D":"On-demand pricing"},"correct_answer":"B. Spot pricing"},{"id":"Q6","question":"Amazon EC2 ________ allow you to request spare Amazon EC2 computing capacity for up to 90 percent off the On-Demand price.","options":{"A":"Spot Instances","B":"Compute","C":"Reserved","D":"On-demand"},"correct_answer":"A. Spot Instances"},{"id":"Q7","question":"Now that you have started your migration to the cloud, you want to find out which service you use the most and where the majority of your traffic is coming from. Which tool should you use?","options":{"A":"AWS Cost Explorer","B":"AWS Free Tier","C":"AWS Simple Monthly Calculator","D":"AWS Annual Calculator"},"correct_answer":"A. AWS Cost Explorer"},{"id":"Q8","question":"Cloud Computing Pricing models have been broadly classified as:","options":{"A":"All the options","B":"Hybrid pricing model","C":"Subscription Based","D":"Pay-as-Use"},"correct_answer":"A. All the options"},{"id":"Q9","question":"Which of the following Amazon EC2 tenancy model allow customers to use existing server-bound software licenses?","options":{"A":"Reserved Instances","B":"Dedicated Hosts","C":"Spot Instances","D":"On-Demand Instances"},"correct_answer":"B. Dedicated Hosts"},{"id":"Q10","question":"Which attribute determines the costing of an on-demand EC2 instance?","options":{"A":"Instance type","B":"AMI type","C":"Region","D":"All of the above"},"correct_answer":"D. All of the above (Instance type, AMI type, Region)"},{"id":"Q11","question":"Which of the pricing option, customers pay per hour for compute?","options":{"A":"Reserved","B":"Savings Plan","C":"Spot","D":"On-demand"},"correct_answer":"D. On-demand"},{"id":"Q12","question":"Amazon EBS pricing includes three factors:","options":{"A":"Volume","B":"Snapshot","C":"Data transfer","D":"All of the above"},"correct_answer":"D. All of the above"},{"id":"Q13","question":"Which tenancy model is least expensive model?","options":{"A":"Dedicated Host","B":"Shadow","C":"Shared","D":"Dedicated Instance"},"correct_answer":"C. Shared"},{"id":"Q14","question":"Cost varies between regions (True/False)","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q15","question":"Which AWS service is closely integrated with AWS Budgets to provide cost and usage data?","options":{"A":"AWS IAM","B":"AWS Lambda","C":"Amazon RDS","D":"AWS Cost Explorer"},"correct_answer":"D. AWS Cost Explorer"},{"id":"Q16","question":"In AWS, you need to buy servers to host application (True/False)","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q17","question":"The pricing models of the cloud providers can help the customers in _________","options":{"A":"loss of flexibility","B":"Overuse of the resource","C":"Cost Saving","D":"using resources expensively"},"correct_answer":"C. Cost Saving"},{"id":"Q18","question":"Which tenancy model is most expensive?","options":{"A":"Dedicated Instance","B":"Shadow","C":"Shared","D":"Dedicated Host"},"correct_answer":"D. Dedicated Host"},{"id":"Q19","question":"For how long can you use the AWS Free Tier?","options":{"A":"12 months","B":"3 months","C":"Until your account is suspended","D":"1 month"},"correct_answer":"A. 12 months"},{"id":"Q20","question":"Which EC2 pricing option is most cheapest among below?","options":{"A":"Spot","B":"Reserved","C":"On-demand","D":"Savings Plans"},"correct_answer":"A. Spot"},{"id":"Q21","question":"The AWS Well-Architected Tool provides a plan on how to architect for the cloud using established best practices.","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q22","question":"_________ focuses on achieving the lowest price for a system/workload. Optimize the cost while considering the account needs without ignoring factors like security, reliability, and performance.","options":{"A":"Cost Optimization","B":"Operational excellence","C":"Performance efficiency","D":"Security"},"correct_answer":"A. Cost Optimization"},{"id":"Q23","question":"Which pillar is a combination of processes, continuous improvement, and monitoring system that delivers business value and continuously improve supporting processes and procedures.","options":{"A":"Performance efficiency","B":"Operational excellence","C":"Reliability","D":"Cost Optimization"},"correct_answer":"B. Operational excellence"},{"id":"Q24","question":"What AWS service is used to convert speech to text?","options":{"A":"Amazon CodeWhisperer","B":"Amazon Comprehend","C":"Amazon Lex","D":"Amazon Transcribe"},"correct_answer":"D. Amazon Transcribe"},{"id":"Q25","question":"A pillar focuses on ensuring a system/workload delivers maximum performance for a set of AWS resources utilized.","options":{"A":"Performance efficiency","B":"Cost Optimization","C":"Reliability","D":"Operational excellence"},"correct_answer":"A. Performance efficiency"},{"id":"Q26","question":"The primary goal of the 'Security' pillar in the Well-Architected Framework is protecting data, systems, and assets.","options":{"A":"optimal performance","B":"Maximizing the efficiency of resources","C":"Protecting data, systems, and assets","D":"operates with optimal performance"},"correct_answer":"C. Protecting data, systems, and assets"},{"id":"Q27","question":"Which of the following is NOT a pillar of the AWS Well-Architected Framework?","options":{"A":"Operational Excellence","B":"Cost Optimization","C":"Security","D":"Persistence"},"correct_answer":"D. Persistence"},{"id":"Q28","question":"How does the 'Cost Optimization' pillar suggest handling unused or underutilized resources?","options":{"A":"Upgrade them to larger instances","B":"Turn them off when not needed","C":"Keep them running to ensure availability","D":"Right size resources"},"correct_answer":"D. Right size resources"},{"id":"Q29","question":"________ is a small, rugged, and secure edge computing and data transfer device.","options":{"A":"AWS Snowball","B":"AWS Snowcone","C":"Amazon Edge Computing","D":"Amazon CodeWhisperer"},"correct_answer":"B. AWS Snowcone"},{"id":"Q30","question":"Which pillar of the Well-Architected Framework focuses on the ability to recover from failures and meet customer demands?","options":{"A":"Reliability","B":"Operational excellence","C":"Cost Optimization","D":"Performance efficiency"},"correct_answer":"A. Reliability"},{"id":"Q31","question":"Which pillar of the Well-Architected Framework focuses on ensuring that information, systems, and assets are adequately protected?","options":{"A":"Cost Optimization","B":"Reliability","C":"Performance Efficiency","D":"Security"},"correct_answer":"D. Security"},{"id":"Q32","question":"Well Architected Framework designed to help you build the most secure, high-performing, resilient and efficient infrastructure.","options":{"A":"False","B":"True"},"correct_answer":"B. True"},{"id":"Q33","question":"Which of the following is not a AWS Well-Architected Framework pillar?","options":{"A":"Availability","B":"Performance Efficiency","C":"Reliability","D":"Security"},"correct_answer":"A. Availability"},{"id":"Q34","question":"What does the Operational Excellence pillar of the Well-Architected Framework focus on?","options":{"A":"Minimizing costs","B":"Enhancing system reliability","C":"Streamlining operations","D":"Ensuring high performance"},"correct_answer":"C. Streamlining operations"},{"id":"Q35","question":"Which of the following is a best practice for cost optimization in AWS?","options":{"A":"Regularly reviewing and modifying","B":"Ignoring unused resources","C":"Over-provisioning instances","D":"Using expensive instance types"},"correct_answer":"A. Regularly reviewing and modifying"},{"id":"Q36","question":"Well Architected Framework provide on-demand access to the best practices developed by architects.","options":{"A":"False","B":"True"},"correct_answer":"B. True"},{"id":"Q37","question":"AWS Well-Architected Framework tool is used for reviewing existing infrastructure.","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q38","question":"Which of the piller responsible for automatic recovery?","options":{"A":"Security","B":"Performance Efficiency","C":"Cost Optimization","D":"Reliability"},"correct_answer":"D. Reliability"},{"id":"Q39","question":"AWS IAM belongs to which piller in Well Architected Framework?","options":{"A":"Performance Efficiency","B":"Security","C":"Operation Excellence","D":"Reliability"},"correct_answer":"B. Security"},{"id":"Q40","question":"How many pillers are there in Well Architected Framework?","options":{"A":"5","B":"4","C":"6","D":"3"},"correct_answer":"C. 6"},{"id":"Q41","question":"How to set max permission for a user?","options":{"A":"Permission Boundry","B":"Group","C":"Policy","D":"Role"},"correct_answer":"A. Permission Boundry"},{"id":"Q42","question":"IAM policies can be attached to ___________","options":{"A":"user","B":"group","C":"role","D":"All of the above"},"correct_answer":"D. All of the above (user, group, role)"},{"id":"Q43","question":"What is the primary purpose of AWS IAM?","options":{"A":"Scaling virtual machines","B":"Controlling access to AWS resources","C":"Analyzing log data","D":"Managing database instances"},"correct_answer":"B. Controlling access to AWS resources"},{"id":"Q44","question":"Which AWS service used for automated security assessments?","options":{"A":"AWS KMS","B":"AWS CloudHSM","C":"AWS Inspector","D":"AWS Shield"},"correct_answer":"C. AWS Inspector"},{"id":"Q45","question":"What is the benefit of using IAM roles for EC2 instances?","options":{"A":"Easier management of EC2 instances","B":"Automatic scaling of EC2 instances","C":"Improved security by avoiding the use of roles","D":"Secure access to AWS services without storing credentials"},"correct_answer":"D. Secure access to AWS services without storing credentials"},{"id":"Q46","question":"AWS is responsible for protecting the Global infrastructure based on shared responsibility model.","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q47","question":"Which of the following entity allow a user to access AWS resources temporarily?","options":{"A":"IAM Policy","B":"IAM User","C":"IAM Role","D":"IAM Access Keys"},"correct_answer":"C. IAM Role"},{"id":"Q48","question":"Which of the following are best practices of IAM?","options":{"A":"Delete root user password","B":"Delete access keys of root user","C":"Delete root user account","D":"Enable Multifactor authentication"},"correct_answer":"B and D (Delete access keys of root user, Enable Multifactor authentication)"},{"id":"Q49","question":"Which AWS service protects applications running on AWS against DDoS attacks?","options":{"A":"AWS Inspector","B":"AWS Shield","C":"AWS KMS","D":"AWS IAM"},"correct_answer":"B. AWS Shield"},{"id":"Q50","question":"Which AWS service provides access to security and compliance documents?","options":{"A":"AWS CloudHSM","B":"AWS KMS","C":"AWS Artifact","D":"AWS Inspector"},"correct_answer":"C. AWS Artifact"},{"id":"Q51","question":"To simplify the assignment of similar permission for many users, ________ is used.","options":{"A":"organizational units","B":"resource management","C":"root account","D":"groups"},"correct_answer":"D. groups"},{"id":"Q52","question":"The addition layer of security along with the user credentials is ______________","options":{"A":"Single Sign on","B":"authentication","C":"authorization","D":"multifactor authentication"},"correct_answer":"D. multifactor authentication"},{"id":"Q53","question":"Authentication is the method of verifying the users.","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q54","question":"Which of the following services are managed service?","options":{"A":"Amazon RDS","B":"Amazon EBS","C":"Amazon S3","D":"Amazon EC2"},"correct_answer":"A and C (Amazon S3, Amazon RDS)"},{"id":"Q55","question":"Which of the below option is not a security best practice?","options":{"A":"Grant least privilege","B":"Use AWS account root user for daily activities","C":"Remove unnecessary users and credentials","D":"Use roles for applications"},"correct_answer":"B. Use AWS account root user for daily activities"},{"id":"Q56","question":"The method of authentication that enables the user to authenticate into multiple application with one set of credentials is __________","options":{"A":"Single Sign on","B":"authorization","C":"multifactor authentication","D":"authentication"},"correct_answer":"A. Single Sign on"},{"id":"Q57","question":"The person or a workload who uses the AWS resources is known as __________","options":{"A":"Normal user","B":"AWS user","C":"priviliged user","D":"Root user"},"correct_answer":"B. AWS user"},{"id":"Q58","question":"Which service used to control access to the services and resources?","options":{"A":"AWS WAF","B":"Amazon IAM","C":"Amazon KMS","D":"AWS Sheild"},"correct_answer":"B. Amazon IAM"},{"id":"Q59","question":"Security in the cloud means customers are responsible for securing everything they deploy in the cloud.","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q60","question":"To organize and manage the AWS resources, __________ is used.","options":{"A":"organizational units","B":"Admistrative rights","C":"resource groups","D":"resource management"},"correct_answer":"C. resource groups"},{"id":"Q61","question":"Which of the following database services support dynamic schema?","options":{"A":"Amazon Aurora","B":"Amazon ElastiCache","C":"Amazon RDS","D":"Amazon DynamoDB"},"correct_answer":"D. Amazon DynamoDB"},{"id":"Q62","question":"Which of the following messaging services is based on pub/sub messaging model?","options":{"A":"STS","B":"SES","C":"SNS","D":"SQS"},"correct_answer":"C. SNS"},{"id":"Q63","question":"Cloudwatch can monitor custom metrics in-addition to built-in metrics.","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q64","question":"Which is the AWS service used for configuring Content Delivery Network (CDN)?","options":{"A":"Amazon CDN","B":"Amazon ElastiCache","C":"Amazon CloudFormation","D":"Amazon CloudFront"},"correct_answer":"D. Amazon CloudFront"},{"id":"Q65","question":"Which of the following is a serverless computing?","options":{"A":"Amazon ECS","B":"Amazon EKS","C":"Amazon Lambda","D":"Amazon EC2"},"correct_answer":"C. Amazon Lambda"},{"id":"Q66","question":"Which AWS service used for enabling asynchronous communication between services?","options":{"A":"SQS","B":"SES","C":"STS","D":"SNS"},"correct_answer":"A. SQS"},{"id":"Q67","question":"_________ is a serverless container orchestration service.","options":{"A":"EKS","B":"Fargate","C":"ECS","D":"ECR"},"correct_answer":"B. Fargate"},{"id":"Q68","question":"Choose the infrastructure automation service from the given list:","options":{"A":"Amazon EC2","B":"Amazon CloudFront","C":"Amazon ElastiCache","D":"Amazon CloudFormation"},"correct_answer":"D. Amazon CloudFormation"},{"id":"Q69","question":"Which of the following load balancers support content based routing?","options":{"A":"All the options mentioned","B":"Classic Load Balancer","C":"Application Load Balancer","D":"Network Load Balancer"},"correct_answer":"C. Application Load Balancer"},{"id":"Q70","question":"Which of the following provides shared storage for Linux workloads?","options":{"A":"EBS","B":"S3","C":"EFS","D":"FSX"},"correct_answer":"C. EFS"},{"id":"Q71","question":"Which of the following database service is postgresql and mysql compatible database?","options":{"A":"Amazon RDS","B":"Amazon Redshift","C":"Amazon Aurora","D":"Amazon Neptune"},"correct_answer":"C. Amazon Aurora"},{"id":"Q72","question":"AutoScaling increases/decreases the capacity of an EC2 instance automatically.","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q73","question":"AWS DynamoDB is a serverless nosql database.","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q74","question":"Monitoring the resources helps in __________","options":{"A":"Filtering requests","B":"Record all API requests","C":"optimize usage","D":"identify the unusual activities"},"correct_answer":"C and D (optimize usage, identify the unusual activities)"},{"id":"Q75","question":"Which of the following service is used for monitoring resources in AWS?","options":{"A":"Amazon Cognito","B":"Amazon CloudTrail","C":"Amazon CloudWatch","D":"Amazon EventBridge"},"correct_answer":"C. Amazon CloudWatch"},{"id":"Q76","question":"How manual scaling is done in EC2 auto scaling?","options":{"A":"Adjusting Max size","B":"Adjusting the load","C":"Adjusting Min size","D":"Adjusting Desired capacity"},"correct_answer":"D. Adjusting Desired capacity"},{"id":"Q77","question":"Which of the following entity used for temporary access to resources?","options":{"A":"Policy","B":"Group","C":"Role","D":"User"},"correct_answer":"C. Role"},{"id":"Q78","question":"Which of the following is NOT a benefit of using Amazon CloudWatch?","options":{"A":"Automated resource provisioning","B":"Alarm notifications","C":"Real-time monitoring","D":"Customizable dashboards"},"correct_answer":"A. Automated resource provisioning"},{"id":"Q79","question":"Which of the following database is keyvalue pair or document database?","options":{"A":"Amazon RDS","B":"Amazon Redshift","C":"Amazon DynamoDB","D":"Amazon Neptune"},"correct_answer":"C. Amazon DynamoDB"},{"id":"Q80","question":"Which CloudWatch component allows you to create and manage custom alarms?","options":{"A":"CloudWatch Events","B":"CloudWatch Metrics","C":"CloudWatch Logs","D":"CloudWatch Alarms"},"correct_answer":"D. CloudWatch Alarms"},{"id":"Q81","question":"__________ is a master image which provides the information required for the creation of virtual servers known as EC2 instances in the AWS environment.","options":{"A":"AMI","B":"IAM","C":"AIM","D":"MIA"},"correct_answer":"A. AMI"},{"id":"Q82","question":"What are the different types of instances? Choose all that apply.","options":{"A":"Computer Optimized","B":"General purpose","C":"Storage Optimized","D":"Power Optimized"},"correct_answer":"A, B, and C (Computer Optimized, General purpose, Storage Optimized)"},{"id":"Q83","question":"What is a virtual server platform that allows users to create and run virtual machines on Amazon's server farm?","options":{"A":"VM","B":"EC2","C":"HSM","D":"EC5"},"correct_answer":"B. EC2"},{"id":"Q84","question":"Amazon EC2 Instances utilizes Intel\u00ae Xeon\u00ae processors for providing customers with high performance and value.","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q85","question":"What is an AMI?","options":{"A":"Amazon Instance","B":"Amazon Machine Image","C":"AmazonMemory Image","D":"Amazon Memory instance"},"correct_answer":"B. Amazon Machine Image"},{"id":"Q86","question":"Can you resize an EBS volume on a running EC2 instance?","options":{"A":"Not possible","B":"With downtime","C":"Without downtime","D":"Certain Volume type"},"correct_answer":"C. Without downtime"},{"id":"Q87","question":"EC2 instance type \u2014 ________ for compute-intensive workloads.","options":{"A":"Computer Optimized","B":"General purpose","C":"Memory Optimized","D":"Storage Optimized"},"correct_answer":"A. Computer Optimized"},{"id":"Q88","question":"An Amazon EBS volume can be attached to multiple instances at a time.","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q89","question":"Custom AMI can be created which includes application in the image.","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q90","question":"Which of the following is a valid EC2 instance type?","options":{"A":"t2.micro","B":"micro.t2","C":"xmax","D":"xlage"},"correct_answer":"A. t2.micro"},{"id":"Q91","question":"Which of the following storage class store files in on Availability Zone?","options":{"A":"S3 infrequent access","B":"S3 Glacier","C":"S3 standard","D":"S3 One Zone"},"correct_answer":"D. S3 One Zone"},{"id":"Q92","question":"What type of storage is S3?","options":{"A":"Block Storage","B":"File Storage","C":"Network storage","D":"Object Storage"},"correct_answer":"D. Object Storage"},{"id":"Q93","question":"Which of the following storage class suitable for performance sensitive data?","options":{"A":"S3 standard","B":"S3 One Zone","C":"S3 infrequent access","D":"S3 Glacier"},"correct_answer":"A. S3 standard"},{"id":"Q94","question":"What feature required to keep multiple variants of an object in the same bucket?","options":{"A":"Versioning","B":"Access Point","C":"Replication","D":"Encryption"},"correct_answer":"A. Versioning"},{"id":"Q95","question":"In Amazon S3 a single object size can be?","options":{"A":"10TB","B":"5TB","C":"1TB","D":"2TB"},"correct_answer":"B. 5TB"},{"id":"Q96","question":"Using S3, you can host __________","options":{"A":"NodeJS application","B":"Static Website","C":"Dynamic Website","D":"Php Application"},"correct_answer":"B. Static Website"},{"id":"Q97","question":"Which of the following is a general purpose Instance Type?","options":{"A":"m4.large","B":"r5.4xlarge","C":"p3.2xlarge","D":"t2.micro"},"correct_answer":"D. t2.micro"},{"id":"Q98","question":"S3 Bucket supports versioning? TRUE/FALSE","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q99","question":"When you create a bucket, by default the bucket is private.","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q100","question":"Which service is used to create virtual machine in AWS?","options":{"A":"Elastic Beanstalk","B":"Amazon RDS","C":"Amazon S3","D":"Amazon EC2"},"correct_answer":"D. Amazon EC2"},{"id":"Q101","question":"When could a company decide to use a hybrid deployment model for cloud computing?","options":{"A":"To fully comply with government regulations","B":"To eliminate all legacy applications","C":"To maintain legacy applications on premises","D":"To use only cloud-based data and analytics services"},"correct_answer":"C. To maintain legacy applications on premises"},{"id":"Q102","question":"How does cloud computing compare to traditional data centers in terms of obtaining new resources?","options":{"A":"Traditional data centers provide unlimited resources instantly.","B":"Cloud computing enables access to new resources in minutes.","C":"Traditional data centers are more agile in resource acquisition.","D":"Cloud computing takes weeks to obtain new resources."},"correct_answer":"B. Cloud computing enables access to new resources in minutes."},{"id":"Q103","question":"AWS eliminate guessing on your infrastructure capacity needs.","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q104","question":"Which of the following is NOT a characteristic of cloud computing?","options":{"A":"On-demand self-service","B":"Resource pooling","C":"Broad network access","D":"Limited scalability"},"correct_answer":"D. Limited scalability"},{"id":"Q105","question":"Which of the following consists of one or more data centres?","options":{"A":"Origin","B":"Region","C":"AvailabilityZone","D":"location"},"correct_answer":"C. AvailabilityZone"},{"id":"Q106","question":"__________ eliminates the management of the underlying infrastructure (usually hardware and operating systems) and allows customer to focus on deploying and managing the applications.","options":{"A":"SaaS","B":"PaaS","C":"XaaS","D":"IaaS"},"correct_answer":"B. PaaS"},{"id":"Q107","question":"AWS Cloud's global footprint enables you to easily deploy applications to consumers all around the world (True/False).","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q108","question":"When did AWS start offering IT infrastructure services as web services?","options":{"A":"2012","B":"2010","C":"2006","D":"2020"},"correct_answer":"C. 2006"},{"id":"Q109","question":"Cloud computing is the on-demand delivery of cloud services via the Internet with pay-as-you-go pricing.","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q110","question":"Which one of the following is Cloud Platform by Amazon?","options":{"A":"GCP","B":"Cloudera","C":"AWS","D":"Azure"},"correct_answer":"C. AWS"},{"id":"Q111","question":"Customer has to choose the nearest __________ to the customers to reduce latency.","options":{"A":"Edge location","B":"Region","C":"Availability zone","D":"Data center"},"correct_answer":"B. Region"},{"id":"Q112","question":"Which cloud deployment model involves a single organization using a cloud service exclusively?","options":{"A":"Private Cloud","B":"Community Cloud","C":"Hybrid Cloud","D":"Public Cloud"},"correct_answer":"A. Private Cloud"},{"id":"Q113","question":"Select a benefit of a datacenter from the following options:","options":{"A":"High Availability","B":"Scalability","C":"Control","D":"Cost Efficient"},"correct_answer":"C. Control"},{"id":"Q114","question":"In which of the following model application host completely on cloud?","options":{"A":"Hybrid","B":"Private","C":"On-prem","D":"Public"},"correct_answer":"D. Public"},{"id":"Q115","question":"One of the benefit of the cloud is agility, resource can be provisioned with few click. True/False.","options":{"A":"True","B":"False"},"correct_answer":"A. True"},{"id":"Q116","question":"What is cost optimization?","options":{"A":"Ignoring financial planning altogether","B":"Maximizing spending on non-essential items","C":"Spending money without any budget constraints","D":"Reduce expenses while maintaining quality"},"correct_answer":"D. Reduce expenses while maintaining quality"},{"id":"Q117","question":"Which of the following is not a management interface in AWS?","options":{"A":"AWS SDK","B":"AWS CLI","C":"AWS Management Console","D":"AWS Portal"},"correct_answer":"D. AWS Portal"},{"id":"Q118","question":"Which of the following service, customer has access to OS?","options":{"A":"PaaS","B":"CaaS","C":"IaaS","D":"SaaS"},"correct_answer":"C. IaaS"},{"id":"Q119","question":"What does SaaS stand for in cloud computing?","options":{"A":"Software as a Solution","B":"Software as a Service","C":"Storage as a Service"},"correct_answer":"B. Software as a Service"},{"id":"Q120","question":"Which of the following is not a cloud service model?","options":{"A":"Platform as a Service (PaaS)","B":"Operating System as a Service (OSaaS)","C":"Infrastructure as a Service (IaaS)","D":"Software as a Service (SaaS)"},"correct_answer":"B. Operating System as a Service (OSaaS)"}],"Security Concepts":[{"id":"Q1","question":"What is the main purpose of a Man-in-the-Middle (MiTM) attack in cybersecurity?","options":{"A":"To encrypt sensitive data","B":"To steal user credentials","C":"To secure email communications","D":"To protect data from unauthorized access"},"correct_answer":"B. To steal user credentials"},{"id":"Q2","question":"You receive an email from an unknown sender with an attachment, and you want to make sure it hasn't been tampered with during transmission. What should you use to verify the email's integrity?","options":{"A":"Encryption","B":"Steganography","C":"Asymmetric Encryption","D":"Hashing"},"correct_answer":"D. Hashing"},{"id":"Q3","question":"Which cryptographic technique is used to verify data integrity and detect unintended corruption of data but is no longer considered reliable for cryptographic checksums due to vulnerabilities?","options":{"A":"MAC","B":"Encryption","C":"Private Key Encryption","D":"Asymmetric Encryption"},"correct_answer":"A. MAC"},{"id":"Q4","question":"You want to transform a piece of data into a fixed hashed value for data integrity verification. Which method should you use?","options":{"A":"Steganography","B":"Asymmetric Encryption","C":"Hashing","D":"Encryption"},"correct_answer":"C. Hashing"},{"id":"Q5","question":"You need to ensure that the data you're sending is not just encrypted but also concealed within another file to hide its existence. What technique should you use?","options":{"A":"Encryption","B":"Private Key Encryption","C":"Steganography","D":"Asymmetric Encryption"},"correct_answer":"C. Steganography"},{"id":"Q6","question":"You suspect that an attacker is trying to break the encryption of your system by analyzing the internal structure of the encryption algorithm. What type of attack is this?","options":{"A":"Statistical analysis attack","B":"Brute-force attack","C":"Social engineering attack","D":"Analytical attack"},"correct_answer":"D. Analytical attack"},{"id":"Q7","question":"How can the Diffie-Hellman key exchange algorithm be used in cybersecurity?","options":{"A":"To perform MD5 hashing","B":"To encrypt data using a fixed-length key","C":"To achieve forward secrecy in key exchange","D":"To create digital signatures"},"correct_answer":"C. To achieve forward secrecy in key exchange"},{"id":"Q8","question":"In a public key directory system, what is the potential weakness if an attacker gains access?","options":{"A":"The directory becomes too complex","B":"Participants lose access to their public keys","C":"The directory may publish counterfeit public keys","D":"The encryption process becomes slower"},"correct_answer":"C. The directory may publish counterfeit public keys"},{"id":"Q9","question":"You want to securely send a confidential document to your colleague over the internet. Which cryptographic method should you choose?","options":{"A":"Private Key Encryption","B":"Parallel Encryption","C":"Asymmetric encryption","D":"Symmetric Encryption"},"correct_answer":"C. Asymmetric encryption"},{"id":"Q10","question":"Which encryption method processes data one block at a time and uses a fixed-length key, such as AES?","options":{"A":"EES","B":"AES","C":"RSA","D":"DES"},"correct_answer":"D. DES"},{"id":"Q11","question":"What type of attack involves trying all possible combinations of keys or passwords?","options":{"A":"Cryptanalysis Attack","B":"Man-in-the-Middle Attack","C":"Dictionary Attack","D":"Phishing Attack"},"correct_answer":"C. Dictionary Attack"},{"id":"Q12","question":"What is the purpose of a Message Authentication Code (MAC)?","options":{"A":"To compress data","B":"To verify the integrity and authenticity of a message","C":"To encrypt messages","D":"To hide the recipient's identity"},"correct_answer":"B. To verify the integrity and authenticity of a message"},{"id":"Q13","question":"In asymmetric encryption, which key is kept private?","options":{"A":"Private Key","B":"Secret Key","C":"Shared Key","D":"Public Key"},"correct_answer":"A. Private Key"},{"id":"Q14","question":"Which encryption algorithm is widely used for securing web traffic and email communication?","options":{"A":"DES","B":"RSA","C":"AES","D":"EES"},"correct_answer":"C. AES"},{"id":"Q15","question":"Which type of attack intercepts and possibly modifies communication between two parties?","options":{"A":"Man-in-the-Middle Attack","B":"Dictionary Attack","C":"Cryptanalysis Attack","D":"Phishing Attack"},"correct_answer":"A. Man-in-the-Middle Attack"},{"id":"Q16","question":"Which type of attack involves overwhelming a system or network to disrupt its operation?","options":{"A":"Cryptanalysis Attack","B":"Cryptanalysis Attack","C":"Denial of Service (DoS) Attack","D":"Brute Force Attack"},"correct_answer":"C. Denial of Service (DoS) Attack"},{"id":"Q17","question":"Which type of encryption uses the same key for both encryption and decryption?","options":{"A":"Symmetric Encryption","B":"Asymmetric Encryption","C":"Private Key Encryption","D":"Encryption"},"correct_answer":"A. Symmetric Encryption"},{"id":"Q18","question":"What does a digital certificate from a Certificate Authority (CA) bind?","options":{"A":"Private key to a public key","B":"Private key to a MAC","C":"Public key to a MAC","D":"Public key to a private key"},"correct_answer":"D. Public key to a private key"},{"id":"Q19","question":"What is the primary purpose of encryption?","options":{"A":"To increase data transfer speed","B":"To hide the recipient's identity","C":"To compress data","D":"To protect data from unauthorized access"},"correct_answer":"D. To protect data from unauthorized access"},{"id":"Q20","question":"Which encryption algorithm is no longer considered secure due to its vulnerability to brute-force attacks?","options":{"A":"AES","B":"DES","C":"EES","D":"RSA"},"correct_answer":"B. DES"},{"id":"Q21","question":"In an organization, employees often share sensitive information and passwords insecurely, such as through phone calls or emails. What modern tool could help improve security in such scenarios?","options":{"A":"Encrypted emails","B":"Secure communication application like Slack","C":"Firewall","D":"Role-based access control (RBAC)"},"correct_answer":"B. Secure communication application like Slack"},{"id":"Q22","question":"An organization is concerned about maintaining the confidentiality of their data. What security service would be their primary focus?","options":{"A":"Data Confidentiality","B":"Data Integrity","C":"Authentication","D":"Non-repudiation"},"correct_answer":"A. Data Confidentiality"},{"id":"Q23","question":"A user attempts to access a secure system. To verify their identity, the system asks the user to provide a fingerprint scan. What security service is being utilized?","options":{"A":"Authorization","B":"Data Confidentiality","C":"Authentication","D":"Data Integrity"},"correct_answer":"C. Authentication"},{"id":"Q24","question":"An employee at a large corporation receives an email that appears to be from their IT department, asking for their login credentials to perform a system update. What type of attack is this likely to be?","options":{"A":"Worm attack","B":"Virus attack","C":"Phishing attack","D":"Denial of service attack"},"correct_answer":"C. Phishing attack"},{"id":"Q25","question":"An organization wants to implement a system that restricts access to sensitive data based on user roles. What security mechanism should they consider?","options":{"A":"Role-based access control (RBAC)","B":"Intrusion Detection System (IDS)","C":"Password sharing","D":"Cryptography"},"correct_answer":"A. Role-based access control (RBAC)"},{"id":"Q26","question":"A web application wants to ensure that user sessions are secure and protected from unauthorized access. Which practice is most important to implement?","options":{"A":"Configuring long and unpredictable session tokens","B":"Sharing session tokens via email","C":"Not using session tokens","D":"Using plain text for session tokens"},"correct_answer":"A. Configuring long and unpredictable session tokens"},{"id":"Q27","question":"An attacker intercepts network traffic to gather information about the communication patterns within an organization, aiming to identify potential vulnerabilities. What type of attack is being described here?","options":{"A":"Replay attack","B":"Traffic analysis attack","C":"Brute force attack","D":"Man-in-the-Middle attack"},"correct_answer":"B. Traffic analysis attack"},{"id":"Q28","question":"A user visits a website that prompts them to download a seemingly necessary software update. However, after the download, the user's computer becomes compromised, and sensitive data is at risk. What kind of threat is this?","options":{"A":"Phishing attack","B":"Malicious website","C":"Worm attack","D":"Virus attack"},"correct_answer":"B. Malicious website"},{"id":"Q29","question":"A network experiences a sudden surge in traffic, causing it to slow down significantly and eventually become inaccessible. Which type of attack is most likely responsible for this situation?","options":{"A":"Worm attack","B":"Virus attack","C":"Trojan attack","D":"Denial of Service (DoS) attack"},"correct_answer":"D. Denial of Service (DoS) attack"},{"id":"Q30","question":"An employee unknowingly opens an email attachment that contains a malicious program. This program spreads to other files and starts causing damage to the employee's computer. What type of malware is this?","options":{"A":"Trojan","B":"Worm","C":"Spyware","D":"Virus"},"correct_answer":"D. Virus"},{"id":"Q31","question":"Which of the following is an example of a security threat?","options":{"A":"Antivirus software","B":"Firewall configuration","C":"Data backup","D":"Phishing email"},"correct_answer":"D. Phishing email"},{"id":"Q32","question":"What is the primary objective of RBAC?","options":{"A":"Restrict access based on user location","B":"Ensure total system access for all users","C":"Assign access based on random selection","D":"Control access based on user roles"},"correct_answer":"D. Control access based on user roles"},{"id":"Q33","question":"Which security attack involves trying all possible combinations to guess a password?","options":{"A":"SQL Injection","B":"Phishing","C":"Brute Force Attack","D":"DDoS"},"correct_answer":"C. Brute Force Attack"},{"id":"Q34","question":"Which security ose of these port numbers?","options":{"A":"To identify the overall area of the network","B":"To route data packets to the right application or service","C":"To ensure data integrity during transmission","D":"To prevent data theft"},"correct_answer":"B. To route data packets to the right application or service"},{"id":"Q42","question":"An employee mistakenly disclosed sensitive business data to an unauthorized third party. What security measures should the company have implemented to prevent this?","options":{"A":"Digital signature","B":"Captcha verification","C":"Data encryption","D":"Authorization"},"correct_answer":"C. Data encryption"},{"id":"Q43","question":"Your company is setting up a web server to handle sensitive customer information. You want to ensure that data transmitted between the server and clients is secure. What technology should you implement to achieve this?","options":{"A":"TCP","B":"UDP","C":"SSL/TLS","D":"Hashing"},"correct_answer":"C. SSL/TLS"},{"id":"Q44","question":"In a company, an employee accidentally shared sensitive financial data with unauthorized personnel. What aspect of computer security was compromised?","options":{"A":"Integrity","B":"Authentication","C":"Availability","D":"Confidentiality"},"correct_answer":"D. Confidentiality"},{"id":"Q45","question":"You are responsible for data security in your organization, and you want to ensure that data integrity is maintained when sharing files internally. Which cryptographic technique should you use for this purpose?","options":{"A":"Asymmetric encryption","B":"Hashing","C":"Public Key Infrastructure (PKI)","D":"Symmetric encryption"},"correct_answer":"B. Hashing"},{"id":"Q46","question":"You are designing a secure online banking application. Which type of authentication method would you recommend to enhance security while allowing users to access their accounts with a username and password?","options":{"A":"Public Key Infrastructure (PKI)","B":"Token-based authentication","C":"Biometri n't generate data","B":"Generative models learn the data distribution, while discriminative models learn the decision boundary","C":"Generative models are used for classification only","D":"Generative models are always better"},"correct_answer":"B. Generative models learn the data distribution, while discriminative models learn the decision boundary"},{"id":"Q163","question":"For what tasks can generative models be applied?","options":{"A":"Classification only","B":"Only denoising","C":"Only data generation","D":"Data generation, denoising, inpainting, and more"},"correct_answer":"D. Data generation, denoising, inpainting, and more"},{"id":"Q164","question":"Within generative models, what function does the discriminator serve in GANs?","options":{"A":"To optimize the generator","B":"To capture the joint probability","C":"To generate new data","D":"To distinguish between real and generated data"},"correct_answer":"D. To distinguish between real and generated data"},{"id":"Q165","question":"Within the architecture of Generative Adversarial Networks (GANs), which duo of fundamental elements are paramount?","options":{"A":"Classifier and Regressor","B":"Activator and Deactivator","C":"Forward and Backward Propagators","D":"Generator and Discriminator"},"correct_answer":"D. Generator and Discriminator"},{"id":"Q166","question":"In the context of generative models, what does P(x) represent?","options":{"A":"The joint probability of x and y","B":"The likelihood of x","C":"The probability distribution of the data x","D":"The posterior probability of x"},"correct_answer":"C. The probability distribution of the data x"},{"id":"Q167","question":"Which of the following is NOT a generative model?","options":{"A":"Support Vector Machines","B":"Generative Adversarial Networks","C":"Gaussian Mixture Models","D":"Restricted Boltzmann Machines"},"correct_answer":"A. Support Vector Machines"},{"id":"Q168","question":"Generative models are primarily used for which of the following tasks?","options":{"A":"Generating new data samples similar to the input data","B":"Regression","C":"Reinforcement learning","D":"Classification"},"correct_answer":"A. Generating new data samples similar to the input data"},{"id":"Q169","question":"What is the primary goal of generative models in AI?","options":{"A":"To optimize algorithms","B":"To generate new data samples","C":"To analyze data distributions","D":"To classify data"},"correct_answer":"B. To generate new data samples"},{"id":"Q170","question":"Which of the following is crucial for understanding the behavior of generative models?","options":{"A":"Backpropagation","B":"Activation functions","C":"Probability distributions and likelihood","D":"Convolutional layers"},"correct_answer":"C. Probability distributions and likelihood"},{"id":"Q171","question":"Which model type is primarily concerned with determining P(y | x)?","options":{"A":"Discriminative Model","B":"Generative Model","C":"Bayesian model","D":"Regression model"},"correct_answer":"A. Discriminative Model"},{"id":"Q172","question":"Which statement best differentiates generative from discriminative models?","options":{"A":"Generative models learn the joint probability distribution, while discriminative models learn the conditional probability","B":"Generative models cannot be trained with labeled data","C":"Generative models are only for images, discriminative for text","D":"Generative models are newer than discriminative models"},"correct_answer":"A. Generative models learn the joint probability distribution, while discriminative models learn the conditional probability"},{"id":"Q173","question":"What does likelihood measure in the context of a model?","options":{"A":"The probability of the model being correct","B":"How well the model explains the observed data","C":"The complexity of the model","D":"The error rate of the model"},"correct_answer":"B. How well the model explains the observed data"},{"id":"Q174","question":"In the context of models, what does P(x | y) typically represent?","options":{"A":"The probability of x given y","B":"The likelihood of y","C":"The probability of y given x","D":"The distribution of y"},"correct_answer":"A. The probability of x given y"},{"id":"Q175","question":"If a model is better at distinguishing between classes rather than generating data, it is likely a __________.","options":{"A":"Discriminative model","B":"Bayesian model","C":"Joint probability model","D":"Generative model"},"correct_answer":"A. Discriminative model"},{"id":"Q176","question":"Which application of ML is used to detect unusual patterns in data?","options":{"A":"Clustering","B":"Anomaly Detection","C":"Classification","D":"Ranking"},"correct_answer":"B. Anomaly Detection"},{"id":"Q177","question":"Which of the following is a challenge in training deep neural networks?","options":{"A":"Linear activation functions","B":"Too few neurons","C":"All neurons activating at once","D":"Vanishing/Exploding gradients"},"correct_answer":"D. Vanishing/Exploding gradients"},{"id":"Q178","question":"Which of the following is a common activation function in neural networks?","options":{"A":"Weighted Sum","B":"ReLU (Rectified Linear Unit)","C":"Polynomial Function","D":"Linear Function"},"correct_answer":"B. ReLU (Rectified Linear Unit)"},{"id":"Q179","question":"What is the primary purpose of backpropagation?","options":{"A":"Data preprocessing","B":"Initialization of weights","C":"Forward propagation of data","D":"Adjusting weights based on the error"},"correct_answer":"D. Adjusting weights based on the error"},{"id":"Q180","question":"In a neural network, what does a neuron compute?","options":{"A":"A weighted sum followed by an activation function","B":"The learning rate","C":"The error of the network","D":"The gradient of the loss"},"correct_answer":"A. A weighted sum followed by an activation function"},{"id":"Q181","question":"How is a neural network's performance typically evaluated during training?","options":{"A":"Using the activation functions","B":"Using a validation set","C":"Using the training data","D":"Using the test data"},"correct_answer":"B. Using a validation set"},{"id":"Q182","question":"Which function introduces non-linearity in a neural network?","options":{"A":"Bias Function","B":"Loss Function","C":"Linear Function","D":"Activation Function"},"correct_answer":"D. Activation Function"},{"id":"Q183","question":"Which of the following is NOT a layer type in a typical neural network?","options":{"A":"Quantum Layer","B":"Hidden Layer","C":"Output Layer","D":"Input Layer"},"correct_answer":"A. Quantum Layer"},{"id":"Q184","question":"What is the role of the loss function in training a neural network?","options":{"A":"To introduce non-linearity","B":"To initialize the weights","C":"To activate the neurons","D":"To quantify the difference between predicted and actual values"},"correct_answer":"D. To quantify the difference between predicted and actual values"},{"id":"Q185","question":"In which type of ML does an agent learn by interacting with an environment?","options":{"A":"Clustering","B":"Regression","C":"Reinforcement Learning","D":"Supervised Learning"},"correct_answer":"C. Reinforcement Learning"},{"id":"Q186","question":"Which of the following is a technique to prevent overfitting in neural networks?","options":{"A":"Increasing the number of layers","B":"Learning Rate Adjustment","C":"Using a larger dataset","D":"Dropout"},"correct_answer":"D. Dropout"},{"id":"Q187","question":"Which of the following is NOT a type of machine learning?","options":{"A":"Supervised Learning","B":"Reinforcement Learning","C":"Unsupervised Learning","D":"Recursive Learning"},"correct_answer":"D. Recursive Learning"},{"id":"Q188","question":"Which component of a neural network is responsible for combining inputs and passing them to the next layer?","options":{"A":"Bias","B":"Activation Function","C":"Layer","D":"Neuron (or Node)"},"correct_answer":"D. Neuron (or Node)"},{"id":"Q189","question":"Which activation function outputs a value between 0 and 1?","options":{"A":"Sigmoid","B":"Linear","C":"Leaky ReLU","D":"Hyperbolic Tangent (tanh)"},"correct_answer":"A. Sigmoid"},{"id":"Q190","question":"What is the main difference between regression and classification?","options":{"A":"Classification is unsupervised","B":"Regression predicts a discrete label, Classification predicts a continuous output","C":"Regression uses labeled data, Classification doesn't","D":"Regression predicts a continuous output, Classification predicts a discrete label"},"correct_answer":"D. Regression predicts a continuous output, Classification predicts a discrete label"},{"id":"Q191","question":"What is the primary purpose of a loss function in training neural networks?","options":{"A":"To speed up training","B":"To quantify the difference between predicted and actual values","C":"To initialize weights","D":"To activate neurons"},"correct_answer":"B. To quantify the difference between predicted and actual values"},{"id":"Q192","question":"Which of the following is NOT a common machine learning algorithm?","options":{"A":"Quantum Entanglement","B":"Neural Networks","C":"Decision Trees","D":"Support Vector Machines"},"correct_answer":"A. Quantum Entanglement"},{"id":"Q193","question":"In the context of neural networks, what does the term \"backpropagation\" refer to?","options":{"A":"The initial random assignment of weights","B":"The method of adjusting weights based on the error","C":"The process of adding more layers","D":"The forward flow of data"},"correct_answer":"B. The method of adjusting weights based on the error"},{"id":"Q194","question":"Which application of ML is used to group similar items?","options":{"A":"Clustering","B":"Classification","C":"Recommendation","D":"Regression"},"correct_answer":"A. Clustering"},{"id":"Q195","question":"What is the primary goal of machine learning?","options":{"A":"To increase computational speed","B":"To allow computers to rect_answer":"A. Reinforcement learning in game playing"},{"id":"Q219","question":"Which architecture is primarily associated with attention mechanisms?","options":{"A":"Transformer","B":"GAN","C":"RNN","D":"CNN"},"correct_answer":"A. Transformer"},{"id":"Q220","question":"Who introduced Generative Adversarial Networks (GANs)?","options":{"A":"Andrew Ng","B":"Geoffrey Hinton","C":"Joshua Bengio","D":"Ian Goodfellow"},"correct_answer":"D. Ian Goodfellow"},{"id":"Q221","question":"Why might there be concerns about an over-reliance on data-driven AI in fashion?","options":{"A":"Fashion inherently values human creativity and intuition","B":"AI can store more data than human memory","C":"AI can predict future fashion trends with certainty","D":"AI can process data faster than humans"},"correct_answer":"A. Fashion inherently values human creativity and intuition"},{"id":"Q222","question":"Which is a potential future application of Generative AI in fashion?","options":{"A":"Space exploration","B":"Virtual reality games","C":"Virtual cooking shows","D":"Hyper-personalized clothing"},"correct_answer":"D. Hyper-personalized clothing"},{"id":"Q223","question":"How can Generative AI potentially impact inventory management in fashion?","options":{"A":"By increasing the speed of garment production","B":"By designing new storage systems","C":"By enhancing e-commerce platforms","D":"By predicting fashion trends with higher accuracy"},"correct_answer":"D. By predicting fashion trends with higher accuracy"},{"id":"Q224","question":"What is a potential challenge of over-relying on AI in fashion?","options":{"A":"Reduced customer engagement","B":"Overproduction of garments","C":"Reduced data availability","D":"Overshadowing human creativity and intuition"},"correct_answer":"D. Overshadowing human creativity and intuition"},{"id":"Q225","question":"What aspect of AI in fashion raises concerns about user privacy?","options":{"A":"AI-driven automobiles","B":"AI-generated music","C":"Personalized shopping experiences","D":"Virtual reality games"},"correct_answer":"C. Personalized shopping experiences"},{"id":"Q226","question":"How does AI enhance the shopping experience?","options":{"A":"By providing personalized product recommendations","B":"By offering discounts","C":"By improving website speed","D":"By offering virtual games"},"correct_answer":"A. By providing personalized product recommendations"},{"id":"Q227","question":"Which brand has utilized AI for generating new clothing designs?","options":{"A":"Gucci","B":"StitchFix","C":"H&M","D":"Prada"},"correct_answer":"B. StitchFix"},{"id":"Q228","question":"What ethical concern arises from the use of virtual models in fashion?","options":{"A":"Concerns about AI creating unfashionable designs","B":"Concerns about AI replacing fashion designers","C":"Concerns about AI and electricity consumption","D":"Questions about body image standards and job losses for human models"},"correct_answer":"D. Questions about body image standards and job losses for human models"},{"id":"Q229","question":"Who is a prominent virtual influencer mentioned in the case study?","options":{"A":"Lil Miquela","B":"Naomi Campbell","C":"Kylie Jenner","D":"Bella Hadid"},"correct_answer":"A. Lil Miquela"},{"id":"Q230","question":"How might AI transform the fitting experience in fashion retail?","options":{"A":"By offering discounts during fittings","B":"By allowing customers to virtually \"try on\" clothes","C":"By playing AI-generated music in fitting rooms","D":"By providing a 3D view of the store"},"correct_answer":"B. By allowing customers to virtually \"try on\" clothes"},{"id":"Q231","question":"Beyond body image standards, what's another ethical concern regarding virtual models?","options":{"A":"The potential for AI to misuse personal data","B":"The potential for AI to create unrealistic beauty standards","C":"The potential for AI to replace all human jobs in fashion","D":"The authenticity of virtual influencers in advertising campaigns"},"correct_answer":"D. The authenticity of virtual influencers in advertising campaigns"},{"id":"Q232","question":"What is the global valuation of the fashion industry?","options":{"A":"$500 billion","B":"$2.5 trillion","C":"$1 trillion","D":"$5 trillion"},"correct_answer":"B. $2.5 trillion"},{"id":"Q233","question":"In the context of sustainability, how might AI be used in material design?","options":{"A":"By enhancing fabric softness","B":"By creating more colorful fabrics","C":"By simulating and designing eco-friendly materials","D":"By making fabrics waterproof"},"correct_answer":"C. By simulating and designing eco-friendly materials"},{"id":"Q234","question":"What could be a futuristic application of Generative AI in creating personalized clothing?","options":{"A":"By creating seasonal collections","B":"By analyzing global fashion trends","C":"By designing clothing based on an individual's mood","D":"By replicating popular celebrity styles"},"correct_answer":"C. By designing clothing based on an individual's mood"},{"id":"Q235","question":"How can Generative AI contribute to sustainable fashion?","options":{"A":"By designing video games","B":"By increasing production rates","C":"By enhancing e-commerce platforms","D":"By designing sustainable fabrics"},"correct_answer":"D. By designing sustainable fabrics"},{"id":"Q236","question":"Which is NOT a real-world application of Generative AI?","options":{"A":"Predicting stock market prices","B":"Generating game environments","C":"Deepfake videos","D":"Creating virtual fashion designs"},"correct_answer":"A. Predicting stock market prices"},{"id":"Q237","question":"If an AI system is designed to label images of cats and dogs, it is primarily a __________ model.","options":{"A":"Hybrid","B":"Unsupervised","C":"Reinforcement","D":"Discriminative"},"correct_answer":"D. Discriminative"},{"id":"Q238","question":"What is Generative AI primarily used for?","options":{"A":"Optimization","B":"Data labeling","C":"Regression","D":"Generating new data"},"correct_answer":"D. Generating new data"},{"id":"Q239","question":"Which AI type is best for predicting outcomes?","options":{"A":"Classification AI","B":"Semi-supervised AI","C":"Reinforcement AI","D":"Regression AI"},"correct_answer":"D. Regression AI"},{"id":"Q240","question":"In the context of AI, which model type is more concerned with the underlying distribution of data?","options":{"A":"Hybrid AI","B":"Generative AI","C":"Reinforcement AI","D":"Regression AI"},"correct_answer":"B. Generative AI"},{"id":"Q241","question":"How does Generative AI differ from Classification AI?","options":{"A":"It generates new data rather than categorizing existing data","B":"It's more accurate","C":"It requires more data","D":"It's faster"},"correct_answer":"A. It generates new data rather than categorizing existing data"},{"id":"Q242","question":"Which statement best describes the role of Generative AI?","options":{"A":"It focuses on generating data based on learned patterns","B":"It is exclusively used in robotics","C":"It is primarily used for data sorting","D":"It is best suited for regression tasks"},"correct_answer":"A. It focuses on generating data based on learned patterns"},{"id":"Q243","question":"Which of the following is a direct application of Generative AI in the entertainment industry?","options":{"A":"Recommending movies to users","B":"Creating realistic CGI characters","C":"Automating video editing","D":"Predicting movie success"},"correct_answer":"B. Creating realistic CGI characters"},{"id":"Q244","question":"Why is Generative AI considered significant in the realm of artificial intelligence?","options":{"A":"It simplifies complex algorithms","B":"It speeds up training processes","C":"It can produce new, previously unseen data samples","D":"It reduces the need for large datasets"},"correct_answer":"C. It can produce new, previously unseen data samples"},{"id":"Q245","question":"Generative AI can be used to create which of the following?","options":{"A":"Classification categories","B":"Data labels","C":"Regression models","D":"New artworks and music pieces"},"correct_answer":"D. New artworks and music pieces"},{"id":"Q246","question":"Which statement best defines Generative AI?","options":{"A":"AI that automates repetitive tasks","B":"AI that can generate new data samples","C":"AI that predicts future trends","D":"AI that classifies data"},"correct_answer":"B. AI that can generate new data samples"},{"id":"Q247","question":"In which application is Generative AI NOT typically used?","options":{"A":"Automating customer service chats","B":"Generating music","C":"Producing realistic video game characters","D":"Creating art"},"correct_answer":"A. Automating customer service chats"},{"id":"Q248","question":"What does AI stand for?","options":{"A":"Application Interface","B":"Advanced Integration","C":"Automated Interaction","D":"Artificial Intelligence"},"correct_answer":"D. Artificial Intelligence"},{"id":"Q249","question":"What distinguishes Generative AI from Discriminative AI?","options":{"A":"Generative is for images, Discriminative for text","B":"Generative models data distribution, while Discriminative models the boundary between classes","C":"Generative focuses on labeling, Discriminative on generating","D":"Both are the same"},"correct_answer":"B. Generative models data distribution, while Discriminative models the boundary between classes"},{"id":"Q250","question":"Which of the following is NOT a type of AI?","options":{"A":"Generative AI","B":"Unsupervised AI","C":"Generative Art","D":"Supervised AI"},"correct_answer":"C. Generative Art"},{"id":"Q251","question":"Which AI type primarily focuses on labeling data?","options":{"A":"Semi-supervised AI","B":"Generative AI","C":"Reinforcement AI","D":"Supervised AI"},"correct_answer":"D. Supervised AI"},{"id":"Q252","question":"Which of the following is a real-world example of Generative AI?","options":{"A":"Predicting stock market prices","B":"Generating realistic human faces in movies","C":"Translating languages","D":"Automating cars"},"correct_answer":"B. Generating realistic human faces in movies"},{"id":"Q253","question":"Which type of AI is primarily concerned with how data is generated rather than how it's separated?","options":{"A":"Reinforcement Learning","B":"Unsupervised Learning","C":"Supervised Learning","D":"Generative AI"},"correct_answer":"D. Generative AI"},{"id":"Q254","question":"Generative AI is closely related to which type of models?","options":{"A":"Clustering models","B":"Regression models","C":"Classification models","D":"Generative models"},"correct_answer":"D. Generative models"},{"id":"Q255","question":"Which of the following fields can utilize Generative AI to create new, original content or simulations?","options":{"A":"Art and Music","B":"Data Analysis","C":"Transportation","D":"E-commerce"},"correct_answer":"A. Art and Music"}],"ITIL 4 Foundation":[{"id":"Q1","question":"Which of these are NOT a key focus of the 'partners and suppliers' dimension?","options":{"A":"Contracts and agreements","B":"Security and compliance","C":"Workflow management and inventory systems","D":"Roles and responsibilities"},"correct_answer":"C. Workflow management and inventory systems [1]"},{"id":"Q2","question":"What operating model outlines the key activities required to respond to demand and facilitate value realization through the creation and management of products and services?","options":{"A":"Service value chain","B":"Guiding principles","C":"Practices","D":"Continual improvement"},"correct_answer":"A. Service value chain [1]"},{"id":"Q3","question":"Which of these are a key focus of the 'organization and people' dimension?","options":{"A":"Security and compliance","B":"Contracts and agreements","C":"Activities that transform inputs into outputs","D":"Roles and responsibilities"},"correct_answer":"D. Roles and responsibilities [2]"},{"id":"Q4","question":"Which describes the nature of the guiding principles?","options":{"A":"A guiding principle is a recommendation used as guidance in all circumstances","B":"An organization must implement the guiding principles exactly as defined by the ITIL 4 Foundation manual","C":"A guiding principle is specific and only applies to one initiative within the organization","D":"A guiding principle is mandatory and must be used when adopting a new service within the organization"},"correct_answer":"A. A guiding principle is a recommendation used as guidance in all circumstances [2]"},{"id":"Q5","question":"You are working to design a new service for internal use across your organization. As part of your design efforts, you form a small team with relevant stakeholders from the human resources, information technology, sales, and other relevant departments to ensure the service adequately meets each department's needs and hope this results in great acceptance of the service when delivered. Which guiding principle best describes this scenario?","options":{"A":"Focus on value","B":"Collaborate and promote visibility","C":"Start where you are","D":"Keep it simple and practical"},"correct_answer":"B. Collaborate and promote visibility [3]"},{"id":"Q6","question":"Which ITIL concept describes the service value chain?","options":{"A":"Service value system","B":"Four dimensions of service management","C":"Practices","D":"Seven guiding principles"},"correct_answer":"A. Service value system [4]"},{"id":"Q7","question":"What term best describes a person or a group of people that has its own functions with responsibilities, authorities, and relationships to achieve its objectives?","options":{"A":"Organization","B":"Service provider","C":"Consumer","D":"Customer"},"correct_answer":"A. Organization [4]"},{"id":"Q8","question":"Which value chain activity includes portfolio decisions for design and transition?","options":{"A":"Engage","B":"Deliver and support","C":"Plan","D":"Improve"},"correct_answer":"C. Plan [4]"},{"id":"Q9 ud computing allows users to power up, increase, decrease, shut down, or modify their resources without assistance from the service provider?","options":{"A":"Ubiquitous network access","B":"Self-service on demand","C":"Location-independent resource pooling","D":"Rapid elasticity"},"correct_answer":"B. Self-service on demand [10]"},{"id":"Q4","question":"Which deployment model of cloud computing is characterized by a stable, cloud-based environment with limited access to approved users only?","options":{"A":"Community Cloud","B":"Private Cloud","C":"Hybrid Cloud","D":"Public Cloud"},"correct_answer":"B. Private Cloud [10]"},{"id":"Q5","question":"What is the primary benefit of implementing technology in HR workflows?","options":{"A":"Increasing paperwork","B":"Slowing down task performance","C":"Reducing HR performance","D":"Eliminating repetitive work"},"correct_answer":"D. Eliminating repetitive work [11]"},{"id":"Q6","question":"Which role is responsible for managing the network infrastructure, including network monitoring and vulnerability testing?","options":{"A":"Server administrators","B":"System administrators","C":"Network administrators","D":"HR professionals"},"correct_answer":"C. Network administrators [11]"},{"id":"Q7","question":"What type of cloud computing service model primarily provides dedicated virtual machines with full client control over parameters like CPU cycles and storage capacity?","options":{"A":"PaaS","B":"IaaS","C":"Hybrid Cloud","D":"SaaS"},"correct_answer":"B. IaaS [12]"},{"id":"Q8","question":"In the context of product consumers, who is the end user?","options":{"A":"The company buying hardware or software","B":"The software developer","C":"The IT manager at a large company","D":"The individual employee who uses the technology"},"correct_answer":"D. The individual employee who uses the technology [12]"},{"id":"Q9","question":"What key advantage of cloud computing is associated with reducing total cost of ownership (TCO) and freeing
